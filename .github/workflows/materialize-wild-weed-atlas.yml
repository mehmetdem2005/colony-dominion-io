name: Materialize Wild Weed Atlas

on:
  push:
    branches: [feature/wild-weed-decor-pack-v2]
    paths:
      - ".asset_staging/wild_weeds_atlas/READY"

permissions:
  contents: write

concurrency:
  group: materialize-wild-weed-atlas
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wild-weed-decor-pack-v2
          fetch-depth: 0

      - name: Rebuild and verify atlas
        shell: bash
        run: |
          set -euo pipefail
          STAGING_DIR=.asset_staging/wild_weeds_atlas
          test -f "$STAGING_DIR/READY"
          test "$(cat "$STAGING_DIR/READY")" = "sha256:03af4aed1790393be37385aad00703f60daac94d08ad67f07cb6e2cd934d3b54"
          compgen -G "$STAGING_DIR/part_*" >/dev/null
          cat "$STAGING_DIR"/part_* > /tmp/wild_weeds_atlas.b64
          base64 --decode /tmp/wild_weeds_atlas.b64 > assets/props/wild_weeds/wild_weeds_atlas.png
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import struct
          p = Path("assets/props/wild_weeds/wild_weeds_atlas.png")
          data = p.read_bytes()
          if data[:8] != b"\x89PNG\r\n\x1a\n":
              raise SystemExit("Atlas is not a PNG")
          width, height = struct.unpack(">II", data[16:24])
          if (width, height) != (800, 320):
              raise SystemExit(f"Unexpected atlas dimensions: {width}x{height}")
          digest = hashlib.sha256(data).hexdigest()
          expected = "03af4aed1790393be37385aad00703f60daac94d08ad67f07cb6e2cd934d3b54"
          if digest != expected:
              raise SystemExit(f"Atlas SHA-256 mismatch: {digest}")
          print(f"Verified PNG atlas: {width}x{height}, {len(data)} bytes, {digest}")
          PY

      - name: Commit materialized atlas
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/props/wild_weeds/wild_weeds_atlas.png
          if git diff --cached --quiet; then
            echo "Verified atlas is already materialized."
            exit 0
          fi
          git commit -m "Materialize verified wild weed atlas"
          git push origin HEAD:feature/wild-weed-decor-pack-v2
