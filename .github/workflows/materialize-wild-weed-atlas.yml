name: Materialize Wild Weed Atlas

on:
  push:
    branches: [feature/wild-weed-decor-pack-v2]
    paths:
      - ".asset_staging/wild_weeds_atlas/**"
      - ".github/workflows/materialize-wild-weed-atlas.yml"

permissions:
  contents: write

concurrency:
  group: materialize-wild-weed-atlas
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wild-weed-decor-pack-v2
          fetch-depth: 0

      - name: Rebuild and verify atlas
        shell: bash
        run: |
          set -euo pipefail
          STAGING_DIR=.asset_staging/wild_weeds_atlas
          if ! compgen -G "$STAGING_DIR/part_*" >/dev/null; then
            echo "No atlas parts remain; nothing to materialize."
            exit 0
          fi
          cat "$STAGING_DIR"/part_* > /tmp/wild_weeds_atlas.b64
          base64 --decode /tmp/wild_weeds_atlas.b64 > assets/props/wild_weeds/wild_weeds_atlas.png
          python - <<'PY'
          from pathlib import Path
          import struct
          p = Path("assets/props/wild_weeds/wild_weeds_atlas.png")
          data = p.read_bytes()
          if data[:8] != b"\x89PNG\r\n\x1a\n":
              raise SystemExit("Atlas is not a PNG")
          width, height = struct.unpack(">II", data[16:24])
          if (width, height) != (1280, 512):
              raise SystemExit(f"Unexpected atlas dimensions: {width}x{height}")
          if len(data) < 50000:
              raise SystemExit(f"Atlas is unexpectedly small: {len(data)} bytes")
          print(f"Verified PNG atlas: {width}x{height}, {len(data)} bytes")
          PY

      - name: Commit materialized atlas
        shell: bash
        run: |
          set -euo pipefail
          STAGING_DIR=.asset_staging/wild_weeds_atlas
          if ! compgen -G "$STAGING_DIR/part_*" >/dev/null; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r "$STAGING_DIR"
          git add assets/props/wild_weeds/wild_weeds_atlas.png
          git commit -m "Materialize verified wild weed atlas"
          git push origin HEAD:feature/wild-weed-decor-pack-v2
