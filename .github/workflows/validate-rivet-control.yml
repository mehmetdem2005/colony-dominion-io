name: Validate Rivet Control Plane

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/rivet-control/**"
      - "backend/supabase/**"
      - "network/**"
      - "autoload/**"
      - "gameplay/**"
      - "ui/**"
      - "scenes/**"
      - "tests/**"
      - "tools/verify_live_rivet.py"
      - "tools/deploy_supabase_staging.py"
      - "config/backend_config.json"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/validate-rivet-control.yml"
  pull_request:
    paths:
      - "backend/rivet-control/**"
      - "backend/supabase/**"
      - "network/**"
      - "autoload/**"
      - "gameplay/**"
      - "ui/**"
      - "scenes/**"
      - "tests/**"
      - "tools/verify_live_rivet.py"
      - "tools/deploy_supabase_staging.py"
      - "config/backend_config.json"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/validate-rivet-control.yml"

concurrency:
  group: validate-rivet-control-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /tmp/colony-debug.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install validation tools
        run: |
          python -m pip install --disable-pip-version-check gdtoolkit pglast pyyaml pillow

      - name: Install Godot and export templates
        run: |
          set -euo pipefail
          chmod +x tools/install_godot_ci.sh tools/build_dedicated_server.sh
          tools/install_godot_ci.sh
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          test -f "$TEMPLATE_DIR/android_debug.apk"

      - name: Configure Android SDK and debug signing
        timeout-minutes: 10
        run: |
          set -euo pipefail
          test -d "$ANDROID_SDK_ROOT"
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          if [ ! -d "$ANDROID_SDK_ROOT/build-tools/35.0.1" ] || \
             [ ! -d "$ANDROID_SDK_ROOT/platforms/android-35" ]; then
            yes | "$SDKMANAGER" --licenses >/dev/null || true
            "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
              "platform-tools" \
              "build-tools;35.0.1" \
              "platforms;android-35"
          fi
          test -x "$ANDROID_SDK_ROOT/platform-tools/adb"
          test -d "$ANDROID_SDK_ROOT/build-tools/35.0.1"
          test -d "$ANDROID_SDK_ROOT/platforms/android-35"
          rm -f "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH"
          keytool -keyalg RSA -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH" \
            -storepass android \
            -dname "CN=Android Debug,O=Colony Dominion,C=TR" \
            -validity 10000 \
            -deststoretype PKCS12
          mkdir -p "$HOME/.config/godot"
          EDITOR_SERIES="${GODOT_VERSION%.*}"
          SETTINGS_PATH="$HOME/.config/godot/editor_settings-${EDITOR_SERIES}.tres"
          cat > "$SETTINGS_PATH" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_HOME"
          EOF
          grep -q 'export/android/android_sdk_path' "$SETTINGS_PATH"
          grep -q 'export/android/java_sdk_path' "$SETTINGS_PATH"

      - name: Typecheck Rivet control plane
        working-directory: backend/rivet-control
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run typecheck
          npm run test:policy
          npm run build

      - name: Build validated dedicated server
        run: |
          set -euo pipefail
          tools/build_dedicated_server.sh

      - name: Run query-safe URL regression
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path . \
            --script res://tests/query_safe_url_regression_test.gd

      - name: Run auth confirmation flow regression
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path . \
            --script res://tests/auth_confirmation_flow_test.gd

      - name: Run Google OAuth and bot backfill regression
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path . \
            --script res://tests/google_oauth_bot_backfill_test.gd

      - name: Verify live Rivet control surface
        run: |
          set -euo pipefail
          python tools/verify_live_rivet.py

      - name: Build Android online test APK
        run: |
          set -uo pipefail
          mkdir -p build/android build/online-test
          set +e
          "$GODOT_BIN" --verbose --headless --path . \
            --export-debug "Android" \
            build/android/colony-dominion-online-test.apk \
            2>&1 | tee build/online-test/android-export.log
          EXPORT_CODE=${PIPESTATUS[0]}
          set -e
          echo "$EXPORT_CODE" > build/online-test/android-export-exit-code.txt
          if [ "$EXPORT_CODE" -ne 0 ]; then
            tail -n 240 build/online-test/android-export.log >&2 || true
            exit "$EXPORT_CODE"
          fi
          test -s build/android/colony-dominion-online-test.apk
          unzip -t build/android/colony-dominion-online-test.apk >/dev/null
          sha256sum build/android/colony-dominion-online-test.apk \
            | tee build/android/SHA256SUMS.txt
          stat --printf='%s\n' build/android/colony-dominion-online-test.apk \
            > build/android/apk-size-bytes.txt

      - name: Upload validation evidence and online APK
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: colony-dominion-online-test-apk
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/android/colony-dominion-online-test.apk
            build/android/SHA256SUMS.txt
            build/android/apk-size-bytes.txt
            build/online-test/live-control-smoke.json
            build/online-test/android-export.log
            build/online-test/android-export-exit-code.txt
            build/ci-logs/
