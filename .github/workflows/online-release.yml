name: Online Release Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "network/**"
      - "backend/**"
      - "gameplay/network/**"
      - "gameplay/world/**"
      - "tools/**"
      - "tests/online_*"
      - "project.godot"
      - "export_presets.cfg"
  pull_request:
    paths:
      - "network/**"
      - "backend/**"
      - "gameplay/network/**"
      - "gameplay/world/**"
      - "tools/**"
      - "tests/online_*"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/online-release.yml"

jobs:
  validate-and-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: |
          python -m pip install --disable-pip-version-check gdtoolkit pglast pyyaml pillow
      - name: Install Godot 4.6.3 and export templates
        run: tools/install_godot_ci.sh
      - name: Validate online release architecture
        run: python tools/validate_online_release.py
      - name: Lint project GDScript
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/diagnostics
          mapfile -t gd_files < <(
            find . -type f -name '*.gd' \
              -not -path './.godot/*' \
              -not -path './.godot-bin/*' \
              -not -path './build/*' \
              | sort
          )
          test "${#gd_files[@]}" -gt 0
          printf '%s\n' "${gd_files[@]}" > build/diagnostics/gdscript-files.txt
          gdlint "${gd_files[@]}" 2>&1 | tee build/diagnostics/gdlint.log
      - name: Verify project GDScript formatting
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p build/diagnostics
          mapfile -t gd_files < <(
            find . -type f -name '*.gd' \
              -not -path './.godot/*' \
              -not -path './.godot-bin/*' \
              -not -path './build/*' \
              | sort
          )
          test "${#gd_files[@]}" -gt 0
          set +e
          gdformat --check "${gd_files[@]}" 2>&1 | tee build/diagnostics/gdformat-check.log
          FORMAT_STATUS=${PIPESTATUS[0]}
          if [ "$FORMAT_STATUS" -ne 0 ]; then
            gdformat --diff "${gd_files[@]}" > build/diagnostics/gdformat.diff 2>&1 || true
          else
            : > build/diagnostics/gdformat.diff
          fi
          exit "$FORMAT_STATUS"
      - name: Upload source diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: online-source-diagnostics
          if-no-files-found: warn
          retention-days: 7
          path: build/diagnostics/
      - name: Run deployment bootstrap regression
        run: python tools/test_deploy_online_stack.py
      - name: Typecheck Rivet control plane
        working-directory: backend/rivet-control
        run: |
          npm install --no-audit --no-fund
          npm run typecheck
      - name: Build dedicated server
        run: tools/build_dedicated_server.sh
      - name: Build container image
        run: docker build -f backend/game-server/Dockerfile -t colony-dominion-server:${{ github.sha }} .
      - uses: actions/upload-artifact@v6
        with:
          name: colony-dedicated-server
          path: |
            build/server/colony-dominion-server.x86_64
            build/server/colony-dominion-server.pck
          if-no-files-found: error
