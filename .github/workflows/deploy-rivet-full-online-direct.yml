name: Deploy Rivet Full Online Direct

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-RIVET-FULL-ONLINE-DIRECT
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-rivet-full-online-direct.yml"
      - "tools/deploy_rivet_managed_pool_direct.py"
      - "tools/resolve_supabase_publishable_key.py"
      - "backend/rivet-control/**"
      - "network/**"
      - "autoload/**"
      - "gameplay/match/**"
      - "config/backend_config.json"
      - "core/boot.gd"
      - "project.godot"
      - "export_presets.cfg"

concurrency:
  group: colony-rivet-full-online-staging
  cancel-in-progress: true

jobs:
  deploy-direct:
    if: ${{ github.event_name == 'push' || inputs.confirmation == 'DEPLOY-RIVET-FULL-ONLINE-DIRECT' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 65
    environment: staging
    permissions:
      contents: read
    env:
      RIVET_CLOUD_TOKEN: ${{ secrets.RIVET_CLOUD_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY }}
      REGIONS_JSON: ${{ vars.REGIONS_JSON }}
      SUPPORTED_BUILD_ID: PHASE-05.5-GOOGLE-BOT-BACKFILL
      PROTOCOL_VERSION: "4"
      MIN_PLAYERS: "1"
      MAX_PLAYERS: "10"
      QUEUE_TTL_SECONDS: "120"
      BOT_BACKFILL_WAIT_SECONDS: "30"
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
      IMAGE_REPOSITORY: colony-rivet-full-online

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation tools and Godot
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check gdtoolkit pglast pyyaml pillow
          tools/install_godot_ci.sh

      - name: Validate credentials and resolve client key
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RIVET_CLOUD_TOKEN"
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_SECRET_KEY"
          test -n "$SUPABASE_PROJECT_REF"
          test "$PROTOCOL_VERSION" = "4"
          test "$MIN_PLAYERS" = "1"
          test "$MAX_PLAYERS" = "10"
          echo "::add-mask::$RIVET_CLOUD_TOKEN"
          echo "::add-mask::$SUPABASE_ACCESS_TOKEN"
          echo "::add-mask::$SUPABASE_SECRET_KEY"
          mkdir -p build/rivet-direct build/android
          SUPABASE_KEY_REPORT=build/rivet-direct/supabase-publishable-key.json \
            python tools/resolve_supabase_publishable_key.py

          if [ -z "${REGIONS_JSON:-}" ]; then
            REGIONS_JSON='[{"id":"eu","displayName":"Avrupa","shortName":"EU","probeUrl":"","enabled":true,"providerRegion":"fra"}]'
          fi
          REGIONS_JSON="$REGIONS_JSON" python - <<'PY'
          import json
          import os
          regions = json.loads(os.environ["REGIONS_JSON"])
          if not isinstance(regions, list) or not regions:
              raise SystemExit("REGIONS_JSON must be a non-empty array")
          if not any(isinstance(item, dict) and item.get("enabled") for item in regions):
              raise SystemExit("REGIONS_JSON must contain an enabled region")
          compact = json.dumps(regions, ensure_ascii=False, separators=(",", ":"))
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.write(f"EFFECTIVE_REGIONS_JSON={compact}\n")
          PY

      - name: Validate and build release sources
        shell: bash
        run: |
          set -euo pipefail
          python tools/validate_online_release.py
          python -m py_compile tools/deploy_rivet_managed_pool_direct.py tools/resolve_supabase_publishable_key.py
          npm --prefix backend/rivet-control install --no-audit --no-fund
          npm --prefix backend/rivet-control run typecheck
          npm --prefix backend/rivet-control run build
          tools/build_dedicated_server.sh

      - name: Build and push full-online image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA:0:12}"
          IMAGE_REF="registry.rivet.dev/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"

          printf '%s' "$RIVET_CLOUD_TOKEN" \
            | docker login registry.rivet.dev --username rivet --password-stdin
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --file backend/rivet-control/Dockerfile \
            --tag "$IMAGE_REF" \
            .
          docker image inspect "$IMAGE_REF" \
            --format '{{.Id}} {{.Architecture}}' \
            | tee build/rivet-direct/container-image.txt
          docker run --rm \
            --entrypoint /usr/local/bin/godot \
            "$IMAGE_REF" \
            --headless --version \
            | tee build/rivet-direct/godot-runtime-version.txt
          grep -q "4.6.3" build/rivet-direct/godot-runtime-version.txt
          docker push "$IMAGE_REF"

      - name: Directly upsert managed pool and wait for ready
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          export NODE_ENV=production
          export SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          export REGIONS_JSON="$EFFECTIVE_REGIONS_JSON"
          export RIVET_STARTUP_CANARY=1
          python tools/deploy_rivet_managed_pool_direct.py \
            --namespace staging \
            --image-repository "$IMAGE_REPOSITORY" \
            --image-tag "$IMAGE_TAG" \
            --report build/rivet-direct/direct-deploy.json \
            --timeout-seconds 720 \
            2>&1 | tee build/rivet-direct/direct-deploy.log

      - name: Verify live public control and Godot actor canaries
        timeout-minutes: 12
        shell: bash
        run: |
          set -euo pipefail
          GAME_FOUND=0
          CONTROL_FOUND=0
          for ATTEMPT in $(seq 1 60); do
            set +e
            (
              cd backend/rivet-control
              npx --yes @rivetkit/cli@latest logs \
                --token "$RIVET_CLOUD_TOKEN" \
                --namespace staging \
                -n 1500
            ) > build/rivet-direct/runtime-raw.log 2>&1
            LOG_STATUS=$?
            set -e
            python - <<'PY'
          import os
          import re
          from pathlib import Path
          source = Path("build/rivet-direct/runtime-raw.log")
          raw = source.read_text(encoding="utf-8", errors="replace") if source.exists() else ""
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_ACCESS_TOKEN", "SUPABASE_SECRET_KEY", "SUPABASE_PUBLISHABLE_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          raw = re.sub(r"\x1b\[[0-?]*[ -/]*[@-~]", "", raw)
          Path("build/rivet-direct/runtime-sanitized.log").write_text(raw, encoding="utf-8")
          PY
            if [ "$LOG_STATUS" -eq 0 ] && grep -q 'RIVET_GAME_ACTOR_CANARY_OK' build/rivet-direct/runtime-sanitized.log; then
              GAME_FOUND=1
            fi
            if [ "$LOG_STATUS" -eq 0 ] && grep -q 'RIVET_PUBLIC_CONTROL_GATEWAY_READY' build/rivet-direct/runtime-sanitized.log; then
              CONTROL_FOUND=1
            fi
            if grep -Eq 'RIVET_GAME_ACTOR_CANARY_FAILED|RIVET_FULL_ONLINE_BOOTSTRAP_FAILED' build/rivet-direct/runtime-sanitized.log; then
              cat build/rivet-direct/runtime-sanitized.log >&2
              exit 1
            fi
            if [ "$GAME_FOUND" -eq 1 ] && [ "$CONTROL_FOUND" -eq 1 ]; then
              break
            fi
            sleep 10
          done
          test "$GAME_FOUND" -eq 1
          test "$CONTROL_FOUND" -eq 1

          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          text = Path("build/rivet-direct/runtime-sanitized.log").read_text(encoding="utf-8", errors="replace")
          payload = None
          for line in reversed(text.splitlines()):
              if "RIVET_PUBLIC_CONTROL_GATEWAY_READY" not in line:
                  continue
              match = re.search(r'\{.*"marker"\s*:\s*"RIVET_PUBLIC_CONTROL_GATEWAY_READY".*\}', line)
              if not match:
                  continue
              try:
                  candidate = json.loads(match.group(0))
              except json.JSONDecodeError:
                  continue
              if candidate.get("health_verified") is True:
                  payload = candidate
                  break
          if payload is None:
              raise SystemExit("public control gateway marker could not be parsed")
          url = str(payload.get("public_base_url", "")).rstrip("/")
          if not url.startswith("https://") or not url.endswith("/request"):
              raise SystemExit("public control gateway URL is invalid")
          Path("build/rivet-direct/public-control-url.txt").write_text(url + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.write(f"RIVET_CONTROL_BASE_URL={url}\n")
          PY

      - name: Verify public REST and authentication boundary
        shell: bash
        run: |
          set -euo pipefail
          for PATH_SUFFIX in v1/health v1/health/config v1/regions; do
            OUTPUT_NAME="${PATH_SUFFIX//\//-}.json"
            curl --fail --silent --show-error \
              --retry 8 --retry-delay 3 --retry-all-errors \
              --header 'Accept: application/json' \
              "$RIVET_CONTROL_BASE_URL/$PATH_SUFFIX" \
              > "build/rivet-direct/$OUTPUT_NAME"
          done
          UNAUTHORIZED_CODE="$(curl --silent --show-error \
            --output build/rivet-direct/unauthorized-matchmaking.json \
            --write-out '%{http_code}' \
            --header 'Content-Type: application/json' \
            --request POST \
            --data '{"player_id":"00000000-0000-4000-8000-000000000001","display_name":"Canary","region_preference":"auto","build_id":"PHASE-05.5-GOOGLE-BOT-BACKFILL","protocol_version":4}' \
            "$RIVET_CONTROL_BASE_URL/v1/matchmaking/join")"
          test "$UNAUTHORIZED_CODE" = "401"

          python - <<'PY'
          import json
          from pathlib import Path
          health = json.loads(Path("build/rivet-direct/v1-health.json").read_text())
          config = json.loads(Path("build/rivet-direct/v1-health-config.json").read_text())
          regions = json.loads(Path("build/rivet-direct/v1-regions.json").read_text())
          if health.get("ok") is not True:
              raise SystemExit("public health failed")
          if config.get("ready") is not True or config.get("limits", {}).get("max_players") != 10:
              raise SystemExit(f"public configuration is not ready: {config}")
          if not any(region.get("enabled") for region in regions.get("regions", [])):
              raise SystemExit("no enabled public region")
          PY

      - name: Generate production client config and Android APK
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          export SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          regions_payload = json.loads(Path("build/rivet-direct/v1-regions.json").read_text())
          control_url = os.environ["RIVET_CONTROL_BASE_URL"].rstrip("/")
          publishable_key = os.environ["SUPABASE_PUBLISHABLE_KEY"].strip()
          if not publishable_key or publishable_key.startswith("sb_secret_"):
              raise SystemExit("invalid client publishable key")
          regions = []
          for source in regions_payload.get("regions", []):
              enabled = bool(source.get("enabled", True))
              regions.append({
                  "id": str(source.get("id", "")).strip(),
                  "display_name": str(source.get("display_name", source.get("id", ""))).strip(),
                  "short_name": str(source.get("short_name", source.get("id", ""))).strip(),
                  "probe_url": f"{control_url}/v1/health/ping" if enabled else "",
                  "enabled": enabled,
              })
          config = {
              "environment": "production",
              "build_id": "PHASE-05.5-GOOGLE-BOT-BACKFILL",
              "protocol_version": 4,
              "supabase_url": os.environ["SUPABASE_URL"].rstrip("/"),
              "supabase_publishable_key": publishable_key,
              "rivet_control_base_url": control_url,
              "persist_refresh_token": True,
              "region_probe_interval_seconds": 12.0,
              "region_probe_timeout_seconds": 2.5,
              "regions": regions,
          }
          Path("config/backend_config.json").write_text(
              json.dumps(config, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          Path("build/rivet-direct/client-config-summary.json").write_text(
              json.dumps({
                  "environment": "production",
                  "build_id": config["build_id"],
                  "protocol_version": 4,
                  "supabase_project_ref": os.environ["SUPABASE_PROJECT_REF"],
                  "publishable_key_sha256_12": hashlib.sha256(publishable_key.encode()).hexdigest()[:12],
                  "rivet_control_base_url": control_url,
                  "enabled_regions": [r["id"] for r in regions if r["enabled"]],
              }, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          test -f "$TEMPLATE_DIR/android_debug.apk"
          "$GODOT_BIN" --headless --editor --path . --quit-after 3
          "$GODOT_BIN" --headless --path . \
            --export-debug "Android" \
            build/android/colony-dominion-rivet-staging.apk
          test -s build/android/colony-dominion-rivet-staging.apk
          unzip -t build/android/colony-dominion-rivet-staging.apk >/dev/null
          sha256sum build/android/colony-dominion-rivet-staging.apk \
            | tee build/android/SHA256SUMS.txt
          stat --printf='%s\n' build/android/colony-dominion-rivet-staging.apk \
            > build/android/apk-size-bytes.txt

      - name: Write authoritative release status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          report = {
              "success": True,
              "verified_at": datetime.now(timezone.utc).isoformat(),
              "verification": "direct_pool_upsert_public_control_godot_actor_android_apk",
              "provider": "rivet_only",
              "deployment_method": "direct_cloud_api_managed_pool_upsert",
              "managed_pool_status": "ready",
              "control_plane_live": True,
              "public_control_gateway_ready": True,
              "public_auth_boundary_ready": True,
              "game_server_allocator_ready": True,
              "rivet_game_actor_ready": True,
              "websocket_bridge_ready": True,
              "android_client_config_ready": True,
              "android_staging_apk_ready": True,
              "full_online_ready": True,
              "full_end_to_end_release_ready": True,
              "build_id": "PHASE-05.5-GOOGLE-BOT-BACKFILL",
              "protocol_version": 4,
              "min_players": 1,
              "max_players": 10,
              "bot_backfill_wait_seconds": 30,
          }
          Path("build/rivet-direct/status.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n", encoding="utf-8"
          )
          print("RIVET_DIRECT_DEPLOY_READY=true")
          print("RIVET_PUBLIC_CONTROL_GATEWAY_READY=true")
          print("RIVET_GAME_ACTOR_READY=true")
          print("ANDROID_STAGING_APK_READY=true")
          print("FULL_END_TO_END_RELEASE_READY=true")
          PY

      - name: Upload direct deployment evidence and APK
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: colony-dominion-rivet-direct-staging
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/rivet-direct/
            build/android/
