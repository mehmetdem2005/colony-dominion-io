name: Validate Oracle Hosting Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/external-allocator/**"
      - "backend/game-server/**"
      - "backend/rivet-control/**"
      - "deployment/oracle/**"
      - "tools/build_game_server_image.sh"
      - ".github/workflows/validate-oracle-hosting.yml"

concurrency:
  group: validate-oracle-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      GODOT_VERSION: "4.6.3"
      COMPOSE_FILE: deployment/oracle/docker-compose.staging.yml
      COMPOSE_ENV: deployment/oracle/.env.example
      GAME_SERVER_IMAGE: colony-dominion-server:staging
      ALLOCATOR_IMAGE: colony-external-allocator:staging
      CONTROL_PLANE_IMAGE: colony-rivet-control:staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate control plane and allocator source
        run: |
          set -euo pipefail
          npm --prefix backend/rivet-control ci --no-audit --no-fund
          npm --prefix backend/rivet-control run typecheck
          node --check backend/external-allocator/server.mjs

      - name: Recover validated dedicated-server PCK
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_RUN_ID="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow diagnose-godot.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId'
          )"
          test -n "$SOURCE_RUN_ID"
          echo "Using validated source run: $SOURCE_RUN_ID"
          rm -rf build/recovered build/server
          mkdir -p build/recovered build/server build/diagnostics
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name source-diagnostics \
            --dir build/recovered
          test -s build/recovered/server/colony-dominion-server.pck
          cp build/recovered/server/colony-dominion-server.pck build/server/
          echo "SOURCE_RUN_ID=$SOURCE_RUN_ID" >> "$GITHUB_ENV"

      - name: Validate Docker Compose contract
        run: |
          set -euo pipefail
          docker compose \
            --env-file "$COMPOSE_ENV" \
            -f "$COMPOSE_FILE" \
            config > build/diagnostics/oracle-compose.rendered.yml
          grep -q "colony-external-allocator" build/diagnostics/oracle-compose.rendered.yml
          grep -q "RIVET_RUNTIME_MODE: runner" build/diagnostics/oracle-compose.rendered.yml
          grep -q "20000" build/diagnostics/oracle-compose.rendered.yml

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build control-plane and allocator images
        run: |
          set -euo pipefail
          docker compose \
            --env-file "$COMPOSE_ENV" \
            -f "$COMPOSE_FILE" \
            build control-plane allocator

      - name: Build ARM64 game-server image
        timeout-minutes: 12
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/arm64 \
            --build-arg "GODOT_VERSION=$GODOT_VERSION" \
            --file backend/game-server/Dockerfile \
            --output "type=oci,dest=/tmp/colony-game-server-arm64.oci.tar" \
            .
          test -s /tmp/colony-game-server-arm64.oci.tar

      - name: Build and inspect AMD64 game-server image
        timeout-minutes: 12
        run: |
          set -euo pipefail
          docker build \
            --build-arg "GODOT_VERSION=$GODOT_VERSION" \
            --file backend/game-server/Dockerfile \
            --tag "$GAME_SERVER_IMAGE" \
            .
          docker run --rm \
            --entrypoint /usr/local/bin/godot \
            "$GAME_SERVER_IMAGE" \
            --headless --version | tee build/diagnostics/game-server-runtime-version.log
          grep -q "4.6.3" build/diagnostics/game-server-runtime-version.log

      - name: Exercise allocator end to end
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 32)"
          docker network create colony-staging >/dev/null 2>&1 || true
          docker run -d \
            --name colony-allocator-ci \
            --network colony-staging \
            -p 127.0.0.1:18080:8080 \
            -e "ALLOCATOR_SHARED_TOKEN=$TOKEN" \
            -e "PUBLIC_GAME_HOST=127.0.0.1" \
            -e "CONTROL_BASE_URL=http://127.0.0.1:9" \
            -e "GAME_SERVER_IMAGE=$GAME_SERVER_IMAGE" \
            -e "GAME_SERVER_DOCKER_NETWORK=colony-staging" \
            -e "SUPPORTED_BUILD_ID=PHASE-05.3-ONLINE-PRODUCTION-COMPLETION" \
            -e "PROTOCOL_VERSION=3" \
            -e "MAX_PLAYERS=6" \
            -e "MAX_CONCURRENT_SERVERS=2" \
            -e "GAME_PORT_MIN=22000" \
            -e "GAME_PORT_MAX=22003" \
            -e "CONTROL_PORT_MIN=22100" \
            -e "CONTROL_PORT_MAX=22103" \
            -e "SERVER_READY_TIMEOUT_SECONDS=60" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$ALLOCATOR_IMAGE" >/dev/null

          cleanup() {
            docker ps -aq --filter 'label=io.colony.managed=true' | xargs -r docker rm -f >/dev/null 2>&1 || true
            docker rm -f colony-allocator-ci >/dev/null 2>&1 || true
            docker network rm colony-staging >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:18080/health > build/diagnostics/allocator-health.json; then
              break
            fi
            sleep 1
          done
          test -s build/diagnostics/allocator-health.json

          cat > build/diagnostics/allocation-request.json <<'JSON'
          {
            "region_id": "eu",
            "provider_region": "ci",
            "players": [
              {
                "player_id": "00000000-0000-4000-8000-000000000001",
                "queue_ticket_id": "eu.ci-ticket-1"
              },
              {
                "player_id": "00000000-0000-4000-8000-000000000002",
                "queue_ticket_id": "eu.ci-ticket-2"
              }
            ],
            "build_id": "PHASE-05.3-ONLINE-PRODUCTION-COMPLETION",
            "protocol_version": 3
          }
          JSON

          curl --fail-with-body --silent --show-error \
            -X POST http://127.0.0.1:18080/allocate \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @build/diagnostics/allocation-request.json \
            > build/diagnostics/allocation-first.json

          curl --fail-with-body --silent --show-error \
            -X POST http://127.0.0.1:18080/allocate \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @build/diagnostics/allocation-request.json \
            > build/diagnostics/allocation-second.json

          python - <<'PY'
          import json
          from pathlib import Path

          first = json.loads(Path("build/diagnostics/allocation-first.json").read_text())
          second = json.loads(Path("build/diagnostics/allocation-second.json").read_text())
          assignment = first.get("assignment", {})
          required = ("match_id", "server_id", "host", "port", "expires_at", "protocol_version")
          missing = [key for key in required if not assignment.get(key)]
          if missing:
              raise SystemExit(f"allocation response missing fields: {missing}")
          if first != second:
              raise SystemExit("idempotent allocation retry returned a different response")
          if len(first.get("join_tickets", {})) != 2:
              raise SystemExit("join tickets were not returned for both players")
          if len(first.get("server_auth_token", "")) < 32:
              raise SystemExit("server auth token is missing")
          print("ORACLE_ALLOCATOR_E2E_OK")
          PY

          docker ps --filter 'label=io.colony.managed=true' --format '{{.ID}} {{.Status}} {{.Ports}}' \
            | tee build/diagnostics/game-server-container.log
          test -s build/diagnostics/game-server-container.log

      - name: Upload hosting diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-hosting-validation
          if-no-files-found: warn
          retention-days: 7
          path: build/diagnostics/
