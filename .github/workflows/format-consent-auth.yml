name: Format Consent Auth UI

on:
  push:
    branches:
      - fix/consent-auth-polish
    paths:
      - "ui/colony_ui_kit.gd"
      - "ui/legal_consent_card.gd"
      - "ui/legal_gate_panel.gd"
      - ".github/workflows/format-consent-auth.yml"

permissions:
  contents: write

concurrency:
  group: format-consent-auth-ui
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/consent-auth-polish
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Format changed GDScript
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check gdtoolkit
          gdformat \
            ui/colony_ui_kit.gd \
            ui/legal_consent_card.gd \
            ui/legal_gate_panel.gd
          gdlint \
            ui/colony_ui_kit.gd \
            ui/legal_consent_card.gd \
            ui/legal_gate_panel.gd

      - name: Commit formatter output
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            ui/colony_ui_kit.gd \
            ui/legal_consent_card.gd \
            ui/legal_gate_panel.gd
          git commit -m "Format consent and authentication UI"
          git push origin HEAD:fix/consent-auth-polish
