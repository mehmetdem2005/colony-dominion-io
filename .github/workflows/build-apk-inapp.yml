name: Build In-App (Custom Tabs) APK

# Builds the Android APK that signs in with an in-app Chrome Custom Tab instead
# of switching to the external browser. This requires a native Godot Android
# plugin (androidx.browser Custom Tabs), which in turn requires the Gradle build
# (use_gradle_build=true) rather than the prebuilt template. The separate
# `build-apk.yml` keeps producing the reliable prebuilt APK; this one adds the
# in-app variant. Each step is timeout-guarded and logs upload on failure.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-apk-inapp.yml"
      - "android_plugins/**"
      - "android/plugins/**"
      - "autoload/**"
      - "config/**"
      - "gameplay/**"
      - "network/**"
      - "scenes/**"
      - "ui/**"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/apk-inapp-trigger.txt"

concurrency:
  group: build-apk-inapp
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      # Sign with the committed, STABLE keystore so the APK's SHA-1 never
      # changes — native Google sign-in needs that one SHA-1 registered in
      # Google Cloud Console. (Test key; password is intentionally public.)
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/android/keystore/colony-release.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: colonyio
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: colonyio
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Godot and export templates
        run: |
          set -euxo pipefail
          tools/install_godot_ci.sh
          "$GODOT_BIN" --version

      - name: Install Android SDK packages
        run: |
          set -euxo pipefail
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | timeout 180 "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          timeout 600 "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35"
          echo "SDK_PACKAGES_OK"

      - name: Verify stable signing keystore
        run: |
          set -euxo pipefail
          test -f "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH"
          keytool -list -v \
            -keystore "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH" \
            -storepass "$GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD" \
            -alias "$GODOT_ANDROID_KEYSTORE_DEBUG_USER" | grep -i "SHA1:"
          echo "KEYSTORE_OK"

      - name: Build Android plugin AARs (Custom Tabs + Google Identity)
        run: |
          set -euxo pipefail
          if ! command -v gradle >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y gradle
          fi
          gradle --version
          mkdir -p "$GITHUB_WORKSPACE/android/plugins"
          build_plugin() {
            local dir="$1"; local out="$2"
            ( cd "$dir"
              gradle wrapper --gradle-version 8.10.2 --no-daemon
              ./gradlew --no-daemon --stacktrace assembleRelease
              local aar; aar="$(find build/outputs/aar -name '*.aar' | head -n1)"
              test -n "$aar"
              cp "$aar" "$GITHUB_WORKSPACE/android/plugins/$out"
            )
          }
          build_plugin android_plugins/colony_custom_tabs ColonyCustomTabs.aar
          build_plugin android_plugins/colony_google_identity ColonyGoogleIdentity.aar
          ls -la "$GITHUB_WORKSPACE/android/plugins"
          echo "PLUGIN_AARS_OK"

      - name: Install Godot Android build template
        run: |
          set -euxo pipefail
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          test -f "$TEMPLATE_DIR/android_source.zip"
          rm -rf android/build
          mkdir -p android/build
          unzip -q "$TEMPLATE_DIR/android_source.zip" -d android/build
          printf '%s.stable\n' "$GODOT_VERSION" > android/.build_version
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android/build/local.properties
          test -f android/build/gradlew || (echo "gradlew missing in build template" && exit 1)
          chmod +x android/build/gradlew
          echo "BUILD_TEMPLATE_OK"

      - name: Write Godot editor settings (Android SDK + debug keystore)
        run: |
          set -euxo pipefail
          CFG_DIR="$HOME/.config/godot"
          mkdir -p "$CFG_DIR"
          cat > /tmp/editor_settings.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${GODOT_ANDROID_KEYSTORE_DEBUG_PATH}"
          export/android/debug_keystore_user = "${GODOT_ANDROID_KEYSTORE_DEBUG_USER}"
          export/android/debug_keystore_pass = "${GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD}"
          EOF
          for name in editor_settings-4.tres editor_settings-4.6.tres editor_settings-4.3.tres; do
            install -m 0644 /tmp/editor_settings.tres "$CFG_DIR/$name"
          done
          echo "EDITOR_SETTINGS_WRITTEN"

      - name: Import project resources (headless)
        run: |
          set -uxo pipefail
          mkdir -p build/android
          timeout 900 "$GODOT_BIN" --headless --path . --import \
            2>&1 | tee build/android/import.log
          echo "IMPORT_EXIT=${PIPESTATUS[0]}"

      - name: Export in-app debug APK (Gradle build)
        run: |
          set -uxo pipefail
          timeout 1500 "$GODOT_BIN" --headless --path . \
            --export-debug "AndroidInApp" \
            "$GITHUB_WORKSPACE/build/android/colony-dominion-inapp.apk" \
            2>&1 | tee build/android/export.log
          echo "EXPORT_EXIT=${PIPESTATUS[0]}"
          test -s build/android/colony-dominion-inapp.apk
          unzip -t build/android/colony-dominion-inapp.apk >/dev/null
          sha256sum build/android/colony-dominion-inapp.apk | tee build/android/SHA256SUMS-inapp.txt
          stat --printf='APK size: %s bytes\n' build/android/colony-dominion-inapp.apk

      - name: Upload in-app APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: colony-dominion-inapp-apk
          retention-days: 14
          if-no-files-found: warn
          path: |
            build/android/colony-dominion-inapp.apk
            build/android/SHA256SUMS-inapp.txt
            build/android/import.log
            build/android/export.log

      - name: Publish in-app APK to a direct-download Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-inapp-latest
          name: "Colony Dominion.io — Uygulama İçi Girişli APK"
          body: |
            Google girişini uygulama içi Chrome Custom Tab ile açan sürüm
            (arm64-v8a, Android). Doğrudan indir: colony-dominion-inapp.apk
            Bütünlük doğrulaması için SHA256SUMS-inapp.txt.
          files: |
            build/android/colony-dominion-inapp.apk
            build/android/SHA256SUMS-inapp.txt
          fail_on_unmatched_files: true
