name: Verify Google Auth Bot Backfill Live

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/verify-google-bot-live.yml"

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: staging
    env:
      TARGET_SHA: 6a65b15c51461b5e0cb9881e748bd5b75455b21a
      GH_TOKEN: ${{ github.token }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Locate main deployment runs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/live-google-bot
          locate_run() {
            local workflow="$1"
            local run_id=""
            for _ in $(seq 1 120); do
              run_id="$(
                gh run list \
                  --repo "$GITHUB_REPOSITORY" \
                  --workflow "$workflow" \
                  --branch main \
                  --limit 50 \
                  --json databaseId,headSha \
                  --jq ".[] | select(.headSha == \"$TARGET_SHA\") | .databaseId" \
                  | head -n 1
              )"
              [ -n "$run_id" ] && break
              sleep 5
            done
            test -n "$run_id" || {
              echo "Deployment run not found: $workflow" >&2
              exit 2
            }
            printf '%s' "$run_id"
          }
          SUPABASE_RUN_ID="$(locate_run deploy-supabase-staging.yml)"
          RIVET_RUN_ID="$(locate_run deploy-rivet-control-staging.yml)"
          echo "SUPABASE_RUN_ID=$SUPABASE_RUN_ID" >> "$GITHUB_ENV"
          echo "RIVET_RUN_ID=$RIVET_RUN_ID" >> "$GITHUB_ENV"

      - name: Wait for Supabase deployment
        shell: bash
        run: |
          set -euo pipefail
          gh run watch "$SUPABASE_RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
          gh run view "$SUPABASE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,url,workflowName,createdAt,updatedAt \
            > build/live-google-bot/supabase-run.json

      - name: Wait for Rivet deployment
        shell: bash
        run: |
          set -uo pipefail
          set +e
          gh run watch "$RIVET_RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
          status=$?
          set -e
          if ! gh run view "$RIVET_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,url,workflowName,createdAt,updatedAt \
            > build/live-google-bot/rivet-run.json; then
            python - "$RIVET_RUN_ID" "$status" <<'PY'
          import json
          import sys
          from pathlib import Path
          Path("build/live-google-bot/rivet-run.json").write_text(
              json.dumps(
                  {
                      "databaseId": int(sys.argv[1]),
                      "status": "completed",
                      "conclusion": "success" if int(sys.argv[2]) == 0 else "failure",
                      "metadata_fallback": True,
                  },
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          PY
          fi
          echo "RIVET_WATCH_STATUS=$status" >> "$GITHUB_ENV"

      - name: Verify live OAuth handoff and Auth configuration
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import secrets
          import urllib.error
          import urllib.parse
          import urllib.request
          import uuid
          from pathlib import Path

          output = Path("build/live-google-bot/report.json")
          report = {
              "ok": False,
              "target_sha": os.environ["TARGET_SHA"],
              "supabase_run_id": int(os.environ["SUPABASE_RUN_ID"]),
              "rivet_run_id": int(os.environ["RIVET_RUN_ID"]),
              "stage": "initializing",
              "failures": [],
          }

          def save() -> None:
              output.write_text(
                  json.dumps(report, indent=2, ensure_ascii=False) + "\n",
                  encoding="utf-8",
              )

          def request(url: str, method: str = "GET", body=None, headers=None):
              payload = None if body is None else json.dumps(body).encode("utf-8")
              merged = {
                  "accept": "application/json",
                  "content-type": "application/json",
                  "user-agent": "Colony-Live-Google-Bot-Verification/1.1",
              }
              if headers:
                  merged.update(headers)
              req = urllib.request.Request(url, data=payload, method=method, headers=merged)
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      raw = response.read().decode("utf-8", errors="replace")
                      try:
                          parsed = json.loads(raw) if raw else {}
                      except json.JSONDecodeError:
                          parsed = {"raw": raw[:1000]}
                      return response.status, parsed
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      parsed = json.loads(raw) if raw else {}
                  except json.JSONDecodeError:
                      parsed = {"raw": raw[:1000]}
                  return exc.code, parsed

          try:
              token = os.environ.get("SUPABASE_ACCESS_TOKEN", "").strip()
              project_ref = os.environ.get("SUPABASE_PROJECT_REF", "").strip()
              if not token or not project_ref:
                  raise RuntimeError("Supabase staging verification credentials are missing")

              supabase_url = f"https://{project_ref}.supabase.co"
              function_url = f"{supabase_url}/functions/v1/oauth-google-handoff"

              report["stage"] = "health"
              status, health = request(f"{function_url}/health")
              report["health_status"] = status
              report["health_body"] = health
              if status != 200 or health.get("service") != "colony-google-oauth-handoff":
                  raise RuntimeError("OAuth handoff health endpoint is not ready")
              report["oauth_handoff_health"] = True
              save()

              report["stage"] = "begin"
              request_id = str(uuid.uuid4())
              secret = secrets.token_urlsafe(48)
              secret_hash = hashlib.sha256(secret.encode("utf-8")).hexdigest()
              status, started = request(
                  f"{function_url}/begin",
                  method="POST",
                  body={"request_id": request_id, "secret_hash": secret_hash},
              )
              report["begin_status"] = status
              report["begin_body"] = started
              authorize_url = str(started.get("authorize_url", ""))
              if status != 200 or not authorize_url.startswith(f"{supabase_url}/auth/v1/authorize"):
                  raise RuntimeError("OAuth handoff begin flow failed")
              query = urllib.parse.parse_qs(urllib.parse.urlsplit(authorize_url).query)
              redirect_to = str(query.get("redirect_to", [""])[0])
              expected_callback = f"{function_url}/callback/{request_id}"
              if redirect_to != expected_callback:
                  raise RuntimeError("OAuth authorize URL callback routing is incorrect")
              save()

              report["stage"] = "cancel"
              status, cancelled = request(
                  f"{function_url}/cancel/{request_id}",
                  method="DELETE",
                  headers={"x-colony-oauth-secret": secret},
              )
              report["cancel_status"] = status
              report["cancel_body"] = cancelled
              if status != 200 or not cancelled.get("ok"):
                  raise RuntimeError("OAuth handoff cleanup failed")
              report["oauth_begin_cancel_roundtrip"] = True
              save()

              report["stage"] = "auth_config"
              config_request = urllib.request.Request(
                  f"https://api.supabase.com/v1/projects/{project_ref}/config/auth",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/json",
                      "User-Agent": "Colony-Live-Google-Bot-Verification/1.1",
                  },
              )
              with urllib.request.urlopen(config_request, timeout=30) as response:
                  auth = json.loads(response.read().decode("utf-8"))

              allow_list = str(auth.get("uri_allow_list", ""))
              callback_pattern = f"{function_url}/callback/**"
              if callback_pattern not in allow_list:
                  raise RuntimeError("Google OAuth callback pattern is absent from Auth allow-list")
              if "localhost" in allow_list.lower() or "127.0.0.1" in allow_list:
                  raise RuntimeError("Loopback URL remains in Auth allow-list")
              report["google_callback_allowlisted"] = True
              report["google_provider_enabled"] = bool(auth.get("external_google_enabled"))
              report["google_client_id_present"] = bool(
                  str(auth.get("external_google_client_id", "")).strip()
              )
              report["smtp_host"] = str(auth.get("smtp_host", ""))
              report["smtp_user"] = str(auth.get("smtp_user", ""))
              report["smtp_admin_email_present"] = bool(
                  str(auth.get("smtp_admin_email", "")).strip()
              )

              rivet = json.loads(
                  Path("build/live-google-bot/rivet-run.json").read_text(encoding="utf-8")
              )
              report["rivet_conclusion"] = str(rivet.get("conclusion", ""))
              if report["rivet_conclusion"] != "success":
                  raise RuntimeError("Rivet 05.5 deployment did not complete successfully")

              report["stage"] = "complete"
              report["ok"] = True
          except Exception as exc:
              report["failures"].append(str(exc))
          finally:
              save()
              print(json.dumps(report, ensure_ascii=False))

          if not report["ok"]:
              raise SystemExit(1)
          PY

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: colony-live-google-bot-verification
          retention-days: 2
          if-no-files-found: warn
          path: build/live-google-bot/
