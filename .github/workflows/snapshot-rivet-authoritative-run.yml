name: Snapshot Rivet Authoritative Run

on:
  push:
    branches: [main]
    paths:
      - ".github/rivet-authoritative-snapshot-trigger.txt"

permissions:
  actions: read
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Wait for authoritative run and capture result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="$GITHUB_REPOSITORY"
          WORKFLOW="deploy-rivet-control-authoritative.yml"
          mkdir -p deployment/status

          RUN_ID=""
          for _ in $(seq 1 60); do
            RUN_ID="$(gh run list \
              --repo "$REPO" \
              --workflow "$WORKFLOW" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
            [ -n "$RUN_ID" ] && break
            sleep 3
          done
          test -n "$RUN_ID"

          set +e
          gh run watch "$RUN_ID" --repo "$REPO" --exit-status
          WATCH_STATUS=$?
          set -e

          gh run view "$RUN_ID" \
            --repo "$REPO" \
            --json databaseId,status,conclusion,event,headSha,url,attempt,workflowName \
            > deployment/status/rivet-authoritative-run.json

          if [ "$WATCH_STATUS" -ne 0 ]; then
            gh run view "$RUN_ID" --repo "$REPO" --log-failed \
              > deployment/status/rivet-authoritative-run-failure.log 2>&1 || true
          else
            rm -f deployment/status/rivet-authoritative-run-failure.log
          fi

      - name: Commit snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/status/rivet-authoritative-run.json
          git add -A deployment/status/rivet-authoritative-run-failure.log
          git commit -m "Snapshot authoritative Rivet deployment run"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
