name: Deploy Rivet Control Authoritative

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-rivet-control-authoritative.yml"
      - ".github/rivet-authoritative-trigger.txt"
      - "backend/rivet-control/**"
      - "backend/game-server/**"
      - "network/network_protocol.gd"

concurrency:
  group: colony-rivet-control-authoritative
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: staging
    env:
      RIVET_CLOUD_TOKEN: ${{ secrets.RIVET_CLOUD_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      REGIONS_JSON: ${{ vars.REGIONS_JSON }}
      SUPPORTED_BUILD_ID: PHASE-05.3-ONLINE-PRODUCTION-COMPLETION
      PROTOCOL_VERSION: "3"
      MIN_PLAYERS: "2"
      MAX_PLAYERS: "10"
      QUEUE_TTL_SECONDS: "120"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate credentials and build
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RIVET_CLOUD_TOKEN" || { echo "RIVET_CLOUD_TOKEN is missing" >&2; exit 2; }
          test -n "$SUPABASE_SECRET_KEY" || { echo "SUPABASE_SECRET_KEY is missing" >&2; exit 2; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "SUPABASE_PROJECT_REF is missing" >&2; exit 2; }
          echo "::add-mask::$RIVET_CLOUD_TOKEN"
          echo "::add-mask::$SUPABASE_SECRET_KEY"
          mkdir -p build/rivet-authoritative deployment/status

          curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --retry 6 --retry-delay 3 --retry-max-time 120 --retry-all-errors \
            --header "Authorization: Bearer $RIVET_CLOUD_TOKEN" \
            --header "Accept: application/json" \
            https://cloud-api.rivet.dev/tokens/api/inspect \
            | tee build/rivet-authoritative/token-inspect.json

          npm --prefix backend/rivet-control install --no-audit --no-fund
          npm --prefix backend/rivet-control run typecheck
          npm --prefix backend/rivet-control run build

      - name: Deploy and verify through managed-pool API
        id: deploy
        shell: bash
        timeout-minutes: 28
        run: |
          set -euo pipefail
          RAW_LOG="$RUNNER_TEMP/rivet-authoritative-deploy.log"
          ATTEMPT_LOG="$RUNNER_TEMP/rivet-authoritative-attempt.log"
          EVIDENCE="build/rivet-authoritative"
          RESULT="deployment/status/rivet-staging-authoritative.json"
          : > "$RAW_LOG"

          if [ -z "${REGIONS_JSON:-}" ]; then
            REGIONS_JSON='[{"id":"eu","displayName":"Avrupa","shortName":"EU","probeUrl":"","enabled":true,"providerRegion":"fra"}]'
          fi

          EFFECTIVE_REGIONS_JSON="$(REGIONS_JSON="$REGIONS_JSON" python - <<'PY'
          import json
          import os
          regions = json.loads(os.environ["REGIONS_JSON"])
          if not isinstance(regions, list) or not regions:
              raise SystemExit("REGIONS_JSON must be a non-empty array")
          if not any(isinstance(item, dict) and item.get("enabled") for item in regions):
              raise SystemExit("REGIONS_JSON must contain an enabled region")
          print(json.dumps(regions, ensure_ascii=False, separators=(",", ":")))
          PY
          )"
          test -n "$EFFECTIVE_REGIONS_JSON"

          SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          DEPLOY_STATUS=1
          MAX_ATTEMPTS=4

          cd backend/rivet-control
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            : > "$ATTEMPT_LOG"
            echo "===== RIVET AUTHORITATIVE DEPLOY ATTEMPT $ATTEMPT/$MAX_ATTEMPTS =====" | tee -a "$RAW_LOG"
            set +e
            npx --yes @rivetkit/cli@latest deploy \
              --token "$RIVET_CLOUD_TOKEN" \
              --namespace staging \
              --dockerfile Dockerfile \
              --build-context . \
              --yes \
              --image colony-rivet-control \
              --tag "${GITHUB_SHA:0:12}" \
              --cpu 1 \
              --memory 512Mi \
              --instance-request-concurrency 80 \
              --min-scale 0 \
              --max-scale 1 \
              --max-concurrent-actors 1000 \
              --env "NODE_ENV=production" \
              --env "SUPABASE_URL=${SUPABASE_URL}" \
              --env "SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}" \
              --env "SUPPORTED_BUILD_ID=${SUPPORTED_BUILD_ID}" \
              --env "PROTOCOL_VERSION=${PROTOCOL_VERSION}" \
              --env "MIN_PLAYERS=${MIN_PLAYERS}" \
              --env "MAX_PLAYERS=${MAX_PLAYERS}" \
              --env "QUEUE_TTL_SECONDS=${QUEUE_TTL_SECONDS}" \
              --env "REGIONS_JSON=${EFFECTIVE_REGIONS_JSON}" \
              2>&1 | tee "$ATTEMPT_LOG" | tee -a "$RAW_LOG"
            DEPLOY_STATUS=${PIPESTATUS[0]}
            set -e

            if [ "$DEPLOY_STATUS" -eq 0 ]; then
              break
            fi

            if grep -Eqi '401 Unauthorized|403 Forbidden|invalid token|unauthorized|forbidden|Invalid value specified|validation failed|must be between|not supported with' "$ATTEMPT_LOG"; then
              break
            fi

            if grep -Eqi '429 Too Many Requests|502 Bad Gateway|503 Service Unavailable|504 Gateway Timeout|upstream connect error|connection termination|connection reset|reset before headers|temporarily unavailable|timed out|timeout|TLS|network error|socket hang up|ECONNRESET|ETIMEDOUT' "$ATTEMPT_LOG"; then
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                sleep $((15 * (2 ** (ATTEMPT - 1))))
                continue
              fi
            fi
            break
          done
          cd ../..

          RAW_LOG="$RAW_LOG" EVIDENCE="$EVIDENCE" python - <<'PY'
          import os
          from pathlib import Path
          raw = Path(os.environ["RAW_LOG"]).read_text(encoding="utf-8", errors="replace")
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          Path(os.environ["EVIDENCE"], "deploy-sanitized.log").write_text(raw, encoding="utf-8")
          PY

          test "$DEPLOY_STATUS" -eq 0 || exit "$DEPLOY_STATUS"

          RAW_LOG="$RAW_LOG" EVIDENCE="$EVIDENCE" RESULT="$RESULT" python - <<'PY'
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          raw_log = Path(os.environ["RAW_LOG"]).read_text(encoding="utf-8", errors="replace")
          match = re.search(
              r"https://dashboard\.rivet\.dev/orgs/([^/\s]+)/projects/([^/\s]+)/ns/([^?\s]+)",
              raw_log,
          )
          if match:
              organization, project, namespace = match.groups()
              dashboard_url = match.group(0)
          else:
              inspect = json.loads(Path(os.environ["EVIDENCE"], "token-inspect.json").read_text())
              organization = inspect["organization"]
              project = inspect["project"]
              namespace = "staging-4x4s"
              dashboard_url = (
                  f"https://dashboard.rivet.dev/orgs/{organization}/projects/{project}/ns/{namespace}"
              )

          endpoint = (
              "https://cloud-api.rivet.dev/projects/"
              + urllib.parse.quote(project, safe="")
              + "/namespaces/"
              + urllib.parse.quote(namespace, safe="")
              + "/managed-pools/default?org="
              + urllib.parse.quote(organization, safe="")
          )
          token = os.environ["RIVET_CLOUD_TOKEN"]
          evidence = Path(os.environ["EVIDENCE"])
          last = None
          last_error = ""

          for _ in range(72):
              request = urllib.request.Request(
                  endpoint,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/json",
                      "User-Agent": "colony-rivet-authoritative",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      last = json.loads(response.read().decode("utf-8", errors="replace"))
                  evidence.joinpath("managed-pool.json").write_text(
                      json.dumps(last, indent=2, ensure_ascii=False) + "\n",
                      encoding="utf-8",
                  )
                  status = str(last.get("status", "")).lower()
                  if status == "ready":
                      break
                  if status == "error":
                      raise SystemExit(f"Managed pool entered error state: {last.get('error')}")
              except urllib.error.HTTPError as exc:
                  last_error = f"HTTP {exc.code}"
              except (urllib.error.URLError, TimeoutError, OSError, json.JSONDecodeError) as exc:
                  last_error = str(exc)
              time.sleep(5)
          else:
              raise SystemExit(f"Managed pool did not reach ready: {last_error}; last={last}")

          config = (last or {}).get("config", {})
          resources = config.get("resources", {}) if isinstance(config, dict) else {}
          payload = {
              "success": True,
              "phase": "complete",
              "message": "Rivet deployment succeeded and managed pool reached ready",
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "commit": os.environ.get("GITHUB_SHA", ""),
              "recorded_at": datetime.now(timezone.utc).isoformat(),
              "deployment_verified_by": "cloud_api_managed_pool_status",
              "organization": organization,
              "project": project,
              "cloud_namespace": namespace,
              "dashboard_url": dashboard_url,
              "managed_pool_status": str((last or {}).get("status", "")).lower(),
              "control_plane_live": True,
              "rivet_managed_pool_ready": True,
              "cpu": resources.get("cpu", 1),
              "memory": resources.get("memory", "512Mi"),
              "instance_request_concurrency": resources.get("instanceRequestConcurrency", 80),
              "min_players": 2,
              "max_players": 10,
              "game_server_allocator_ready": False,
              "full_online_ready": False,
          }
          Path(os.environ["RESULT"]).write_text(
              json.dumps(payload, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          print("RIVET_CONTROL_STAGING_READY=true")
          print("MAX_PLAYERS=10")
          print("FULL_ONLINE_READY=false")
          PY

      - name: Capture sanitized runtime logs
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p build/rivet-authoritative
          (
            cd backend/rivet-control
            npx --yes @rivetkit/cli@latest logs \
              --token "$RIVET_CLOUD_TOKEN" \
              --namespace staging \
              -n 200 \
              > ../../build/rivet-authoritative/runtime-raw.log 2>&1
          )
          python - <<'PY'
          import os
          from pathlib import Path
          source = Path("build/rivet-authoritative/runtime-raw.log")
          raw = source.read_text(encoding="utf-8", errors="replace") if source.exists() else ""
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          Path("build/rivet-authoritative/runtime-sanitized.log").write_text(raw, encoding="utf-8")
          source.unlink(missing_ok=True)
          PY
          true

      - name: Commit authoritative status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f deployment/status/rivet-staging-authoritative.json || exit 1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/status/rivet-staging-authoritative.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record authoritative Rivet control status"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Upload authoritative evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rivet-control-authoritative
          if-no-files-found: warn
          retention-days: 14
          path: build/rivet-authoritative/
