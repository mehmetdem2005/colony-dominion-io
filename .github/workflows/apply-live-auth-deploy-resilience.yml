name: Apply Live Auth Deployment Resilience

on:
  push:
    branches:
      - fix/live-auth-deployment-resilience
    paths:
      - ".github/patch/live-auth-deploy-resilience.b64"
      - ".github/workflows/apply-live-auth-deploy-resilience.yml"

permissions:
  contents: write

concurrency:
  group: apply-live-auth-deploy-resilience
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/live-auth-deployment-resilience
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply and validate patch
        run: |
          set -euo pipefail
          base64 --decode .github/patch/live-auth-deploy-resilience.b64 \
            | tar -xzf -
          python -m py_compile tools/deploy_supabase_staging.py
          python -m pip install --disable-pip-version-check pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in (
              Path('.github/workflows/deploy-rivet-control-staging.yml'),
              Path('.github/workflows/deploy-supabase-staging.yml'),
          ):
              with path.open(encoding='utf-8') as handle:
                  parsed = yaml.safe_load(handle)
              if not isinstance(parsed, dict):
                  raise SystemExit(f'Invalid workflow: {path}')
          PY
          grep -q '500 Internal Server Error' .github/workflows/deploy-rivet-control-staging.yml
          grep -q 'blocked_free_tier_default_provider' tools/deploy_supabase_staging.py

      - name: Commit patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tools/deploy_supabase_staging.py \
            .github/workflows/deploy-supabase-staging.yml \
            .github/workflows/deploy-rivet-control-staging.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Harden live auth deployment recovery"
          git push origin HEAD:fix/live-auth-deployment-resilience
