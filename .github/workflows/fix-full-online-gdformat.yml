name: Fix Full Online GDScript Formatting

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'full-online-completion'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          ref: full-online-completion
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Format exact full-online GDScript files
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check gdtoolkit
          gdformat \
            autoload/rivet_online_services.gd \
            network/network_protocol.gd \
            network/rivet_game_transport.gd \
            tests/online_production_completion_test.gd
          gdformat --check \
            autoload/rivet_online_services.gd \
            network/network_protocol.gd \
            network/rivet_game_transport.gd \
            tests/online_production_completion_test.gd

      - name: Commit formatter output
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            autoload/rivet_online_services.gd \
            network/network_protocol.gd \
            network/rivet_game_transport.gd \
            tests/online_production_completion_test.gd
          git commit -m "Format Rivet full-online GDScript"
          git push origin HEAD:full-online-completion
