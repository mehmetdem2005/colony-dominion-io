name: Snapshot Auth Matchmaking Source

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/snapshot-source-auth-matchmaking.yml"
      - ".github/patch/google-bot-workflows.patch.xz.b64"

permissions:
  contents: write

jobs:
  prepare-workflow-blobs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/google-bot-backfill
          fetch-depth: 0

      - name: Apply and validate release workflow updates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/workflow-commit
          echo 'e2ff80f174ca30e4cb0f88a086a751a1d1f0199cdfe573150a25ab3ce7b37493  .github/patch/google-bot-workflows.patch.xz.b64' \
            | sha256sum --check
          base64 --decode .github/patch/google-bot-workflows.patch.xz.b64 \
            | xz --decompress --stdout \
            > "$RUNNER_TEMP/google-bot-workflows.patch"
          echo '7523bbcb9ca954dd027ed4e6c26bc04e7eb88791e0bba7701ab8208a418fd3a6  '"$RUNNER_TEMP/google-bot-workflows.patch" \
            | sha256sum --check
          git apply --whitespace=error "$RUNNER_TEMP/google-bot-workflows.patch"
          git diff --check
          python -m pip install --disable-pip-version-check pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in (
              Path('.github/workflows/build-online-test-apk.yml'),
              Path('.github/workflows/deploy-rivet-control-staging-v2.yml'),
              Path('.github/workflows/deploy-rivet-control-staging.yml'),
              Path('.github/workflows/deploy-rivet-full-online-direct.yml'),
              Path('.github/workflows/deploy-supabase-staging.yml'),
              Path('.github/workflows/online-release.yml'),
              Path('.github/workflows/validate-rivet-control.yml'),
          ):
              with path.open(encoding='utf-8') as handle:
                  if not isinstance(yaml.safe_load(handle), dict):
                      raise SystemExit(f'Invalid workflow: {path}')
          PY
          grep -q 'google_oauth_bot_backfill_test.gd' .github/workflows/build-online-test-apk.yml
          grep -q 'BOT_BACKFILL_WAIT_SECONDS' .github/workflows/deploy-rivet-control-staging.yml
          grep -q 'GOOGLE_OAUTH_CLIENT_ID' .github/workflows/deploy-supabase-staging.yml

      - name: Create workflow blobs and report
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          api = 'https://api.github.com'
          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          branch = 'work/google-bot-backfill'
          paths = [
              '.github/workflows/build-online-test-apk.yml',
              '.github/workflows/deploy-rivet-control-staging-v2.yml',
              '.github/workflows/deploy-rivet-control-staging.yml',
              '.github/workflows/deploy-rivet-full-online-direct.yml',
              '.github/workflows/deploy-supabase-staging.yml',
              '.github/workflows/online-release.yml',
              '.github/workflows/validate-rivet-control.yml',
          ]

          def request(method: str, path: str, payload=None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(
                  api + path,
                  data=data,
                  method=method,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'Colony-Workflow-Blob-Builder/1.0',
                      'Content-Type': 'application/json',
                  },
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read().decode('utf-8'))

          ref = request('GET', f'/repos/{repo}/git/ref/heads/{branch}')
          parent_sha = ref['object']['sha']
          parent = request('GET', f'/repos/{repo}/git/commits/{parent_sha}')
          entries = []
          for path in paths:
              blob = request(
                  'POST',
                  f'/repos/{repo}/git/blobs',
                  {'content': Path(path).read_text(encoding='utf-8'), 'encoding': 'utf-8'},
              )
              entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': blob['sha']})
          report = {
              'branch': branch,
              'parent_sha': parent_sha,
              'base_tree_sha': parent['tree']['sha'],
              'tree_entries': entries,
          }
          output = Path('build/workflow-commit/workflow-blobs.json')
          output.write_text(json.dumps(report, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(report))
          PY

      - uses: actions/upload-artifact@v6
        with:
          name: colony-google-bot-workflow-blobs
          retention-days: 2
          if-no-files-found: error
          path: build/workflow-commit/workflow-blobs.json
