name: Deploy Rivet Control Staging V2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-rivet-control-staging-v2.yml"
      - ".github/rivet-v2-trigger.txt"

concurrency:
  group: colony-rivet-control-staging-v2
  cancel-in-progress: true

jobs:
  deploy-control-v2:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: staging
    permissions:
      contents: read
    env:
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      REGIONS_JSON: ${{ vars.REGIONS_JSON }}
      SUPPORTED_BUILD_ID: PHASE-05.3-ONLINE-PRODUCTION-COMPLETION
      PROTOCOL_VERSION: "3"
      MIN_PLAYERS: "2"
      MAX_PLAYERS: "10"
      QUEUE_TTL_SECONDS: "120"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate credentials and configuration
        shell: bash
        env:
          RIVET_CLOUD_TOKEN: ${{ secrets.RIVET_CLOUD_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$RIVET_CLOUD_TOKEN" || { echo "RIVET_CLOUD_TOKEN is missing" >&2; exit 2; }
          test -n "$SUPABASE_SECRET_KEY" || { echo "SUPABASE_SECRET_KEY is missing" >&2; exit 2; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "SUPABASE_PROJECT_REF is missing" >&2; exit 2; }
          echo "::add-mask::$RIVET_CLOUD_TOKEN"
          echo "::add-mask::$SUPABASE_SECRET_KEY"
          mkdir -p build/rivet-staging-v2

          if [ -z "${REGIONS_JSON:-}" ]; then
            REGIONS_JSON='[{"id":"eu","displayName":"Avrupa","shortName":"EU","probeUrl":"","enabled":true,"providerRegion":"fra"}]'
          fi

          python - <<'PY'
          import json
          import os

          regions = json.loads(os.environ["REGIONS_JSON"])
          if not isinstance(regions, list) or not regions:
              raise SystemExit("REGIONS_JSON must be a non-empty array")
          if not any(isinstance(item, dict) and item.get("enabled") for item in regions):
              raise SystemExit("REGIONS_JSON must contain an enabled region")
          compact = json.dumps(regions, ensure_ascii=False, separators=(",", ":"))
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.write(f"EFFECTIVE_REGIONS_JSON={compact}\n")
          PY

          INSPECT_CODE="$(curl \
            --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --retry 6 --retry-delay 3 --retry-max-time 120 --retry-all-errors \
            --output "$RUNNER_TEMP/rivet-token-inspect.json" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $RIVET_CLOUD_TOKEN" \
            --header "Accept: application/json" \
            https://cloud-api.rivet.dev/tokens/api/inspect)"
          test "$INSPECT_CODE" = "200" || {
            echo "Rivet Cloud token preflight failed with HTTP $INSPECT_CODE" >&2
            exit 2
          }
          echo "Rivet Cloud token preflight passed"
          echo "RIVET_CLOUD_TOKEN=$RIVET_CLOUD_TOKEN" >> "$GITHUB_ENV"

      - name: Typecheck and build control plane
        working-directory: backend/rivet-control
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run typecheck
          npm run build

      - name: Build control-plane container
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f backend/rivet-control/Dockerfile \
            -t colony-rivet-control:${GITHUB_SHA:0:12} \
            backend/rivet-control
          docker image inspect colony-rivet-control:${GITHUB_SHA:0:12} \
            --format '{{.Id}} {{.Architecture}}' \
            | tee build/rivet-staging-v2/container-image.txt

      - name: Deploy corrected control plane to Rivet Compute
        id: deploy
        timeout-minutes: 25
        shell: bash
        run: |
          set -uo pipefail
          RAW_LOG="$RUNNER_TEMP/rivet-control-v2-deploy.log"
          ATTEMPT_LOG="$RUNNER_TEMP/rivet-control-v2-attempt.log"
          SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          : > "$RAW_LOG"

          cd backend/rivet-control
          DEPLOY_STATUS=1
          MAX_ATTEMPTS=4

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            : > "$ATTEMPT_LOG"
            echo "===== RIVET V2 DEPLOY ATTEMPT $ATTEMPT/$MAX_ATTEMPTS =====" | tee -a "$RAW_LOG"

            set +e
            npx --yes @rivetkit/cli@latest deploy \
              --token "$RIVET_CLOUD_TOKEN" \
              --namespace staging \
              --dockerfile Dockerfile \
              --build-context . \
              --yes \
              --image colony-rivet-control \
              --tag "${GITHUB_SHA:0:12}" \
              --cpu 1 \
              --memory 512Mi \
              --instance-request-concurrency 80 \
              --min-scale 0 \
              --max-scale 1 \
              --max-concurrent-actors 1000 \
              --env "NODE_ENV=production" \
              --env "SUPABASE_URL=${SUPABASE_URL}" \
              --env "SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}" \
              --env "SUPPORTED_BUILD_ID=${SUPPORTED_BUILD_ID}" \
              --env "PROTOCOL_VERSION=${PROTOCOL_VERSION}" \
              --env "MIN_PLAYERS=${MIN_PLAYERS}" \
              --env "MAX_PLAYERS=${MAX_PLAYERS}" \
              --env "QUEUE_TTL_SECONDS=${QUEUE_TTL_SECONDS}" \
              --env "REGIONS_JSON=${EFFECTIVE_REGIONS_JSON}" \
              2>&1 | tee "$ATTEMPT_LOG" | tee -a "$RAW_LOG"
            DEPLOY_STATUS=${PIPESTATUS[0]}
            set -e

            if [ "$DEPLOY_STATUS" -eq 0 ]; then
              echo "Rivet V2 deployment succeeded on attempt $ATTEMPT" | tee -a "$RAW_LOG"
              break
            fi

            if grep -Eqi '401 Unauthorized|403 Forbidden|invalid token|unauthorized|forbidden|Invalid value specified for cpu|instanceRequestConcurrency' "$ATTEMPT_LOG"; then
              echo "Permanent Rivet configuration/authentication error; not retrying" >&2
              break
            fi

            if grep -Eqi '503 Service Unavailable|502 Bad Gateway|504 Gateway Timeout|429 Too Many Requests|upstream connect error|connection termination|connection reset|reset before headers|temporarily unavailable|timed out|timeout|TLS|network error|socket hang up|ECONNRESET|ETIMEDOUT' "$ATTEMPT_LOG"; then
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                DELAY=$((15 * (2 ** (ATTEMPT - 1))))
                echo "Transient Rivet failure detected; retrying in ${DELAY}s" | tee -a "$RAW_LOG"
                sleep "$DELAY"
                continue
              fi
            fi

            echo "Non-transient or exhausted Rivet deployment failure" >&2
            break
          done

          cd ../..

          python - "$RAW_LOG" build/rivet-staging-v2/deploy-sanitized.log <<'PY'
          import os
          import sys
          from pathlib import Path

          raw = Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace")
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          Path(sys.argv[2]).write_text(raw, encoding="utf-8")
          PY

          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "Rivet V2 deployment failed with status $DEPLOY_STATUS" >&2
            exit "$DEPLOY_STATUS"
          fi

          python - "$RAW_LOG" build/rivet-staging-v2/control-url.txt <<'PY'
          import re
          import sys
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path
          from urllib.parse import urlsplit

          ansi = re.compile(r"\x1b\[[0-?]*[ -/]*[@-~]")
          text = ansi.sub("", Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace"))
          urls = re.findall(r"https://[^\s<>'\"]+", text)
          blocked = {
              "github.com", "npmjs.com", "www.npmjs.com", "rivet.dev",
              "cloud-api.rivet.dev", "dashboard.rivet.dev", "registry.rivet.dev",
          }
          candidates = []
          for raw in reversed(urls):
              raw = raw.rstrip(".,);]}")
              parts = urlsplit(raw)
              if not parts.scheme or not parts.netloc or parts.hostname in blocked:
                  continue
              origin = f"{parts.scheme}://{parts.netloc}"
              if origin not in candidates:
                  candidates.append(origin)

          if not candidates:
              raise SystemExit("No deployment endpoint URL was emitted by Rivet CLI")

          deadline = time.time() + 360
          last_error = "no endpoint responded"
          while time.time() < deadline:
              for origin in candidates:
                  try:
                      request = urllib.request.Request(
                          f"{origin}/v1/health",
                          headers={"accept": "application/json", "user-agent": "colony-rivet-ci-v2"},
                      )
                      with urllib.request.urlopen(request, timeout=10) as response:
                          body = response.read().decode("utf-8", errors="replace")
                          if response.status == 200 and '"ok":true' in body.replace(" ", ""):
                              Path(sys.argv[2]).write_text(origin + "\n", encoding="utf-8")
                              print(f"Resolved control-plane URL: {origin}")
                              raise SystemExit(0)
                  except (urllib.error.URLError, TimeoutError, OSError) as exc:
                      last_error = f"{origin}: {exc}"
              time.sleep(5)
          raise SystemExit(f"Could not verify deployed endpoint: {last_error}")
          PY

          CONTROL_URL="$(tr -d '\r\n' < build/rivet-staging-v2/control-url.txt)"
          test -n "$CONTROL_URL"
          echo "RIVET_CONTROL_URL=$CONTROL_URL" >> "$GITHUB_ENV"

      - name: Verify corrected staging deployment
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 8 --retry-delay 3 --retry-max-time 180 --retry-all-errors \
            "$RIVET_CONTROL_URL/v1/health" \
            | tee build/rivet-staging-v2/health.json
          curl --fail --silent --show-error --retry 8 --retry-delay 3 --retry-max-time 180 --retry-all-errors \
            "$RIVET_CONTROL_URL/v1/health/config" \
            | tee build/rivet-staging-v2/health-config.json
          curl --fail --silent --show-error --retry 8 --retry-delay 3 --retry-max-time 180 --retry-all-errors \
            "$RIVET_CONTROL_URL/v1/regions" \
            | tee build/rivet-staging-v2/regions.json

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("build/rivet-staging-v2")
          health = json.loads((root / "health.json").read_text())
          config = json.loads((root / "health-config.json").read_text())
          regions = json.loads((root / "regions.json").read_text())
          checks = config.get("checks", {})
          limits = config.get("limits", {})

          if health.get("ok") is not True:
              raise SystemExit("Health endpoint did not return ok=true")
          for key in ("supabase_url", "supported_build_id", "protocol_version", "per_server_auth", "supabase_server_write", "regions"):
              if checks.get(key) is not True:
                  raise SystemExit(f"Required control-plane check failed: {key}")
          if limits.get("min_players") != 2 or limits.get("max_players") != 10:
              raise SystemExit(f"Unexpected matchmaking limits: {limits}")
          if not isinstance(regions.get("regions"), list) or not regions["regions"]:
              raise SystemExit("No regions returned")

          report = {
              "environment": "staging",
              "deployed_at": datetime.now(timezone.utc).isoformat(),
              "commit": os.environ.get("GITHUB_SHA", ""),
              "rivet_control_base_url": os.environ["RIVET_CONTROL_URL"],
              "control_plane_live": True,
              "min_players": 2,
              "max_players": 10,
              "game_server_allocator_ready": checks.get("allocator") is True,
              "full_online_ready": False,
              "health": health,
              "health_config": config,
              "regions": regions,
          }
          (root / "deployment-report.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          print("RIVET_CONTROL_STAGING_READY=true")
          print("MAX_PLAYERS=10")
          PY

      - name: Upload Rivet V2 deployment evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rivet-control-staging-v2
          if-no-files-found: warn
          retention-days: 14
          path: build/rivet-staging-v2/
