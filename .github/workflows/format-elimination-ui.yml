name: Format Elimination UI

on:
  push:
    branches:
      - fix/elimination-responsive-ui
    paths:
      - "tests/online_production_completion_test.gd"
      - "ui/main_menu_layout_guard.gd"
      - "ui/online_match_hud.gd"
      - ".github/workflows/format-elimination-ui.yml"

permissions:
  contents: write

concurrency:
  group: format-elimination-ui
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/elimination-responsive-ui
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Format changed GDScript
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check gdtoolkit
          gdformat \
            tests/online_production_completion_test.gd \
            ui/main_menu_layout_guard.gd \
            ui/online_match_hud.gd
          gdlint \
            tests/online_production_completion_test.gd \
            ui/main_menu_layout_guard.gd \
            ui/online_match_hud.gd

      - name: Commit formatter output
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tests/online_production_completion_test.gd \
            ui/main_menu_layout_guard.gd \
            ui/online_match_hud.gd
          git commit -m "Format elimination lifecycle UI"
          git push origin HEAD:fix/elimination-responsive-ui
