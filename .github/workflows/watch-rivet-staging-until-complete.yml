name: Watch Rivet Staging Until Complete

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/watch-rivet-staging-until-complete.yml"

permissions:
  actions: read
  contents: write

jobs:
  watch-latest:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Find and watch latest staging deployment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="$GITHUB_REPOSITORY"
          WF="deploy-rivet-control-staging.yml"
          STATUS_DIR="deployment/status"
          mkdir -p "$STATUS_DIR"

          RUN_JSON="$(gh run list \
            --repo "$REPO" \
            --workflow "$WF" \
            --branch main \
            --limit 1 \
            --json databaseId,status,conclusion,headSha,url,event,createdAt)"

          RUN_ID="$(jq -r '.[0].databaseId // empty' <<<"$RUN_JSON")"
          if [ -z "$RUN_ID" ]; then
            echo "No Rivet staging deployment run found" >&2
            exit 1
          fi

          echo "Watching Rivet staging run $RUN_ID"
          set +e
          gh run watch "$RUN_ID" --repo "$REPO" --exit-status
          WATCH_STATUS=$?
          set -e

          FINAL_JSON="$(gh run view "$RUN_ID" \
            --repo "$REPO" \
            --json databaseId,status,conclusion,headSha,url,event,createdAt,updatedAt,jobs)"

          gh run view "$RUN_ID" --repo "$REPO" --log-failed \
            > "$STATUS_DIR/rivet-staging-watcher-failure.log" 2>&1 || true
          tail -n 500 "$STATUS_DIR/rivet-staging-watcher-failure.log" \
            > "$STATUS_DIR/rivet-staging-watcher-failure.tail.log" || true
          mv "$STATUS_DIR/rivet-staging-watcher-failure.tail.log" \
            "$STATUS_DIR/rivet-staging-watcher-failure.log"

          python - "$FINAL_JSON" "$WATCH_STATUS" <<'PY'
          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          run = json.loads(sys.argv[1])
          watch_status = int(sys.argv[2])
          jobs = run.get("jobs") or []
          failed_steps = []
          for job in jobs:
              for step in job.get("steps") or []:
                  if step.get("conclusion") in {"failure", "cancelled", "timed_out"}:
                      failed_steps.append({
                          "job": job.get("name"),
                          "step": step.get("name"),
                          "conclusion": step.get("conclusion"),
                      })

          payload = {
              "recorded_at": datetime.now(timezone.utc).isoformat(),
              "run_id": run.get("databaseId"),
              "status": run.get("status"),
              "conclusion": run.get("conclusion"),
              "head_sha": run.get("headSha"),
              "url": run.get("url"),
              "event": run.get("event"),
              "created_at": run.get("createdAt"),
              "updated_at": run.get("updatedAt"),
              "watch_exit_status": watch_status,
              "failed_steps": failed_steps,
          }
          Path("deployment/status/rivet-staging-watcher.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit watcher result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/status/
          if git diff --cached --quiet; then
            echo "No watcher result change to commit"
            exit 0
          fi
          git commit -m "Record latest Rivet staging watcher result"
          git push origin HEAD:main
