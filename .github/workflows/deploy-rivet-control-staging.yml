name: Deploy Rivet Control Staging

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-RIVET-STAGING
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-rivet-control-staging.yml"
      - "backend/rivet-control/**"
      - "backend/game-server/**"
      - "network/network_protocol.gd"

concurrency:
  group: colony-rivet-control-staging
  cancel-in-progress: true

jobs:
  deploy-control:
    if: ${{ github.event_name == 'push' || inputs.confirmation == 'DEPLOY-RIVET-STAGING' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: staging
    permissions:
      contents: read
    env:
      RIVET_CLOUD_TOKEN: ${{ secrets.RIVET_CLOUD_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      REGIONS_JSON: ${{ vars.REGIONS_JSON }}
      SUPPORTED_BUILD_ID: PHASE-05.3-ONLINE-PRODUCTION-COMPLETION
      PROTOCOL_VERSION: "3"
      MIN_PLAYERS: "2"
      MAX_PLAYERS: "10"
      QUEUE_TTL_SECONDS: "120"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Normalize and validate staging credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RIVET_CLOUD_TOKEN" || { echo "RIVET_CLOUD_TOKEN is missing" >&2; exit 2; }
          test -n "$SUPABASE_SECRET_KEY" || { echo "SUPABASE_SECRET_KEY is missing" >&2; exit 2; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "SUPABASE_PROJECT_REF is missing" >&2; exit 2; }
          test "$MIN_PLAYERS" = "2"
          test "$MAX_PLAYERS" = "10"
          echo "::add-mask::$RIVET_CLOUD_TOKEN"
          echo "::add-mask::$SUPABASE_SECRET_KEY"
          mkdir -p build/rivet-staging

          curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --retry 6 --retry-delay 3 --retry-max-time 120 --retry-all-errors \
            --header "Authorization: Bearer $RIVET_CLOUD_TOKEN" \
            --header "Accept: application/json" \
            https://cloud-api.rivet.dev/tokens/api/inspect \
            > build/rivet-staging/token-inspect.json

          if [ -z "${REGIONS_JSON:-}" ]; then
            REGIONS_JSON='[{"id":"eu","displayName":"Avrupa","shortName":"EU","probeUrl":"","enabled":true,"providerRegion":"fra"}]'
          fi

          REGIONS_JSON="$REGIONS_JSON" python - <<'PY'
          import json
          import os
          regions = json.loads(os.environ["REGIONS_JSON"])
          if not isinstance(regions, list) or not regions:
              raise SystemExit("REGIONS_JSON must be a non-empty array")
          if not any(isinstance(item, dict) and item.get("enabled") for item in regions):
              raise SystemExit("REGIONS_JSON must contain an enabled region")
          compact = json.dumps(regions, ensure_ascii=False, separators=(",", ":"))
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.write(f"EFFECTIVE_REGIONS_JSON={compact}\n")
          PY

      - name: Typecheck and build control plane
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix backend/rivet-control install --no-audit --no-fund
          npm --prefix backend/rivet-control run typecheck
          npm --prefix backend/rivet-control run build

      - name: Build control-plane container
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file backend/rivet-control/Dockerfile \
            --tag "colony-rivet-control-ci:${GITHUB_SHA:0:12}" \
            backend/rivet-control
          docker image inspect "colony-rivet-control-ci:${GITHUB_SHA:0:12}" \
            --format '{{.Id}} {{.Architecture}}' \
            | tee build/rivet-staging/container-image.txt

      - name: Deploy control plane to Rivet Compute staging
        id: deploy
        timeout-minutes: 25
        shell: bash
        run: |
          set -uo pipefail

          ROOT="$PWD"
          RAW_LOG="$RUNNER_TEMP/rivet-control-deploy.log"
          ATTEMPT_LOG="$RUNNER_TEMP/rivet-control-attempt.log"
          EVIDENCE="$ROOT/build/rivet-staging"
          SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          DEPLOY_STATUS=1
          MAX_ATTEMPTS=4
          : > "$RAW_LOG"

          cd backend/rivet-control
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            : > "$ATTEMPT_LOG"
            echo "===== RIVET DEPLOY ATTEMPT $ATTEMPT/$MAX_ATTEMPTS =====" | tee -a "$RAW_LOG"

            set +e
            npx --yes @rivetkit/cli@latest deploy \
              --token "$RIVET_CLOUD_TOKEN" \
              --namespace staging \
              --dockerfile Dockerfile \
              --build-context . \
              --yes \
              --image colony-rivet-control \
              --tag "${GITHUB_SHA:0:12}" \
              --cpu 1 \
              --memory 512Mi \
              --instance-request-concurrency 80 \
              --min-scale 0 \
              --max-scale 1 \
              --max-concurrent-actors 1000 \
              --env "NODE_ENV=production" \
              --env "SUPABASE_URL=${SUPABASE_URL}" \
              --env "SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}" \
              --env "SUPPORTED_BUILD_ID=${SUPPORTED_BUILD_ID}" \
              --env "PROTOCOL_VERSION=${PROTOCOL_VERSION}" \
              --env "MIN_PLAYERS=${MIN_PLAYERS}" \
              --env "MAX_PLAYERS=${MAX_PLAYERS}" \
              --env "QUEUE_TTL_SECONDS=${QUEUE_TTL_SECONDS}" \
              --env "REGIONS_JSON=${EFFECTIVE_REGIONS_JSON}" \
              2>&1 | tee "$ATTEMPT_LOG" | tee -a "$RAW_LOG"
            DEPLOY_STATUS=${PIPESTATUS[0]}
            set -e

            if [ "$DEPLOY_STATUS" -eq 0 ]; then
              break
            fi

            if grep -Eqi '401 Unauthorized|403 Forbidden|invalid token|unauthorized|forbidden|Invalid value specified|validation failed|must be between|not supported with' "$ATTEMPT_LOG"; then
              echo "Permanent Rivet configuration or authentication failure" >&2
              break
            fi

            if grep -Eqi '429 Too Many Requests|502 Bad Gateway|503 Service Unavailable|504 Gateway Timeout|upstream connect error|connection termination|connection reset|reset before headers|temporarily unavailable|timed out|timeout|TLS|network error|socket hang up|ECONNRESET|ETIMEDOUT' "$ATTEMPT_LOG"; then
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                DELAY=$((15 * (2 ** (ATTEMPT - 1))))
                echo "Transient Rivet failure; retrying in ${DELAY}s" | tee -a "$RAW_LOG"
                sleep "$DELAY"
                continue
              fi
            fi

            echo "Non-transient or exhausted Rivet deployment failure" >&2
            break
          done
          cd "$ROOT"

          RAW_LOG="$RAW_LOG" EVIDENCE="$EVIDENCE" python - <<'PY'
          import os
          from pathlib import Path
          raw = Path(os.environ["RAW_LOG"]).read_text(encoding="utf-8", errors="replace")
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          Path(os.environ["EVIDENCE"], "deploy-sanitized.log").write_text(raw, encoding="utf-8")
          PY

          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "Rivet deployment failed with status $DEPLOY_STATUS" >&2
            exit "$DEPLOY_STATUS"
          fi

          RAW_LOG="$RAW_LOG" EVIDENCE="$EVIDENCE" python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          ansi = re.compile(r"\x1b\[[0-?]*[ -/]*[@-~]")
          raw = Path(os.environ["RAW_LOG"]).read_text(encoding="utf-8", errors="replace")
          text = ansi.sub("", raw)
          ready = bool(re.search(r"pool status\s+status=ready", text, re.IGNORECASE))
          dashboard = re.search(
              r"https://dashboard\.rivet\.dev/orgs/[^\s]+/projects/[^\s]+/ns/[^?\s]+(?:\?skipOnboarding=1)?",
              text,
          )
          if not ready:
              raise SystemExit("Rivet CLI exited successfully but did not report pool status ready")
          if not dashboard:
              raise SystemExit("Rivet CLI exited successfully but did not emit a staging dashboard URL")

          report = {
              "success": True,
              "verified_at": datetime.now(timezone.utc).isoformat(),
              "verification": "rivet_cli_exit_zero_and_pool_ready",
              "dashboard_url": dashboard.group(0),
              "managed_pool_status": "ready",
              "control_plane_live": True,
              "rivet_managed_pool_ready": True,
              "cpu": 1,
              "memory": "512Mi",
              "instance_request_concurrency": 80,
              "min_players": 2,
              "max_players": 10,
              "game_server_allocator_ready": False,
              "full_online_ready": False,
          }
          evidence = Path(os.environ["EVIDENCE"])
          evidence.joinpath("status.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          evidence.joinpath("control-url.txt").write_text(dashboard.group(0) + "\n", encoding="utf-8")
          print("RIVET_CONTROL_STAGING_READY=true")
          print("MAX_PLAYERS=10")
          print("FULL_ONLINE_READY=false")
          PY

      - name: Capture sanitized Rivet runtime logs
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p build/rivet-staging
          (
            cd backend/rivet-control
            npx --yes @rivetkit/cli@latest logs \
              --token "$RIVET_CLOUD_TOKEN" \
              --namespace staging \
              -n 200 \
              > ../../build/rivet-staging/runtime-raw.log 2>&1
          )
          python - <<'PY'
          import os
          from pathlib import Path
          source = Path("build/rivet-staging/runtime-raw.log")
          raw = source.read_text(encoding="utf-8", errors="replace") if source.exists() else ""
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          Path("build/rivet-staging/runtime-sanitized.log").write_text(raw, encoding="utf-8")
          source.unlink(missing_ok=True)
          PY
          true

      - name: Verify deployed control plane report
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("build/rivet-staging/status.json").read_text())
          assert report["success"] is True
          assert report["managed_pool_status"] == "ready"
          assert report["control_plane_live"] is True
          assert report["rivet_managed_pool_ready"] is True
          assert report["cpu"] == 1
          assert report["instance_request_concurrency"] == 80
          assert report["min_players"] == 2
          assert report["max_players"] == 10
          assert report["game_server_allocator_ready"] is False
          assert report["full_online_ready"] is False
          print("RIVET_CONTROL_STAGING_READY=true")
          print("MAX_PLAYERS=10")
          print("FULL_ONLINE_READY=false")
          PY

      - name: Upload staging control-plane evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rivet-control-staging
          if-no-files-found: warn
          retention-days: 14
          path: build/rivet-staging/
