name: Deploy Rivet Control Staging

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-RIVET-STAGING
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-rivet-control-staging.yml"
      - "backend/rivet-control/**"
      - "backend/game-server/**"
      - "network/network_protocol.gd"

concurrency:
  group: colony-rivet-control-staging
  cancel-in-progress: true

jobs:
  deploy-control:
    if: ${{ github.event_name == 'push' || inputs.confirmation == 'DEPLOY-RIVET-STAGING' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: staging
    permissions:
      contents: read
    env:
      RIVET_CLOUD_TOKEN: ${{ secrets.RIVET_CLOUD_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      REGIONS_JSON: ${{ vars.REGIONS_JSON }}
      SUPPORTED_BUILD_ID: PHASE-05.3-ONLINE-PRODUCTION-COMPLETION
      PROTOCOL_VERSION: "3"
      MIN_PLAYERS: "2"
      MAX_PLAYERS: "10"
      QUEUE_TTL_SECONDS: "120"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate staging configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RIVET_CLOUD_TOKEN" || { echo "RIVET_CLOUD_TOKEN is missing" >&2; exit 2; }
          test -n "$SUPABASE_SECRET_KEY" || { echo "SUPABASE_SECRET_KEY is missing" >&2; exit 2; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "SUPABASE_PROJECT_REF is missing" >&2; exit 2; }
          echo "::add-mask::$RIVET_CLOUD_TOKEN"
          echo "::add-mask::$SUPABASE_SECRET_KEY"
          mkdir -p build/rivet-staging

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          token = os.environ["RIVET_CLOUD_TOKEN"].strip()
          if any(ch.isspace() for ch in token):
              raise SystemExit("RIVET_CLOUD_TOKEN contains whitespace")
          if len(token) < 16:
              raise SystemExit("RIVET_CLOUD_TOKEN is unexpectedly short")

          raw_regions = os.environ.get("REGIONS_JSON", "").strip()
          if not raw_regions:
              raw_regions = '[{"id":"eu","displayName":"Avrupa","shortName":"EU","probeUrl":"","enabled":true,"providerRegion":"fra"}]'
          regions = json.loads(raw_regions)
          if not isinstance(regions, list) or not regions:
              raise SystemExit("REGIONS_JSON must be a non-empty JSON array")
          if not any(isinstance(item, dict) and item.get("enabled") for item in regions):
              raise SystemExit("REGIONS_JSON must contain at least one enabled region")

          compact = json.dumps(regions, ensure_ascii=False, separators=(",", ":"))
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.write(f"EFFECTIVE_REGIONS_JSON={compact}\n")

          diagnostic = {
              "token_family": "cloud_api" if token.startswith("cloud_api_") else "opaque",
              "token_length": len(token),
              "validation_authority": "https://cloud-api.rivet.dev/tokens/api/inspect",
          }
          Path("build/rivet-staging/token-diagnostic.json").write_text(
              json.dumps(diagnostic, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Typecheck and build control plane
        working-directory: backend/rivet-control
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run typecheck
          npm run build

      - name: Build control-plane container
        run: |
          set -euo pipefail
          docker build \
            -f backend/rivet-control/Dockerfile \
            -t colony-rivet-control:${GITHUB_SHA:0:12} \
            backend/rivet-control
          docker image inspect colony-rivet-control:${GITHUB_SHA:0:12} \
            --format '{{.Id}} {{.Architecture}}' \
            | tee build/rivet-staging/container-image.txt

      - name: Deploy control plane to Rivet Compute staging
        id: deploy
        timeout-minutes: 25
        shell: bash
        run: |
          set -uo pipefail
          RAW_LOG="$RUNNER_TEMP/rivet-control-deploy.log"
          ATTEMPT_LOG="$RUNNER_TEMP/rivet-control-deploy-attempt.log"
          INSPECT_BODY="$RUNNER_TEMP/rivet-token-inspect.json"
          SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          : > "$RAW_LOG"

          echo "Preflighting Rivet Cloud token"
          set +e
          INSPECT_CODE="$(curl \
            --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 6 \
            --retry-delay 3 \
            --retry-max-time 120 \
            --retry-all-errors \
            --output "$INSPECT_BODY" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $RIVET_CLOUD_TOKEN" \
            --header "Accept: application/json" \
            https://cloud-api.rivet.dev/tokens/api/inspect)"
          INSPECT_STATUS=$?
          set -e

          if [ "$INSPECT_STATUS" -ne 0 ]; then
            echo "Rivet Cloud API could not be reached after retries" >&2
            exit "$INSPECT_STATUS"
          fi

          case "$INSPECT_CODE" in
            200)
              echo "Rivet Cloud token preflight passed"
              ;;
            401|403)
              echo "Rivet Cloud token rejected with HTTP $INSPECT_CODE" >&2
              exit 2
              ;;
            *)
              echo "Rivet token inspection returned HTTP $INSPECT_CODE" >&2
              cat "$INSPECT_BODY" >&2 || true
              exit 1
              ;;
          esac

          cd backend/rivet-control
          DEPLOY_STATUS=1
          MAX_ATTEMPTS=4

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            : > "$ATTEMPT_LOG"
            echo "===== RIVET DEPLOY ATTEMPT $ATTEMPT/$MAX_ATTEMPTS =====" | tee -a "$RAW_LOG"

            set +e
            npx --yes @rivetkit/cli@latest deploy \
              --token "$RIVET_CLOUD_TOKEN" \
              --namespace staging \
              --dockerfile Dockerfile \
              --build-context . \
              --yes \
              --image colony-rivet-control \
              --tag "${GITHUB_SHA:0:12}" \
              --cpu 1 \
              --memory 512Mi \
              --instance-request-concurrency 80 \
              --min-scale 0 \
              --max-scale 1 \
              --max-concurrent-actors 1000 \
              --env "NODE_ENV=production" \
              --env "SUPABASE_URL=${SUPABASE_URL}" \
              --env "SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}" \
              --env "SUPPORTED_BUILD_ID=${SUPPORTED_BUILD_ID}" \
              --env "PROTOCOL_VERSION=${PROTOCOL_VERSION}" \
              --env "MIN_PLAYERS=${MIN_PLAYERS}" \
              --env "MAX_PLAYERS=${MAX_PLAYERS}" \
              --env "QUEUE_TTL_SECONDS=${QUEUE_TTL_SECONDS}" \
              --env "REGIONS_JSON=${EFFECTIVE_REGIONS_JSON}" \
              2>&1 | tee "$ATTEMPT_LOG" | tee -a "$RAW_LOG"
            DEPLOY_STATUS=${PIPESTATUS[0]}
            set -e

            if [ "$DEPLOY_STATUS" -eq 0 ]; then
              echo "Rivet deployment succeeded on attempt $ATTEMPT" | tee -a "$RAW_LOG"
              break
            fi

            if grep -Eqi '401 Unauthorized|403 Forbidden|invalid token|unauthorized|forbidden' "$ATTEMPT_LOG"; then
              echo "Permanent authentication/authorization failure; not retrying" >&2
              break
            fi

            if grep -Eqi 'Invalid value specified|validation failed|must be between|not supported with' "$ATTEMPT_LOG"; then
              echo "Permanent Rivet deployment configuration failure; not retrying" >&2
              break
            fi

            if grep -Eqi '429 Too Many Requests|502 Bad Gateway|503 Service Unavailable|504 Gateway Timeout|upstream connect error|connection termination|connection reset|reset before headers|temporarily unavailable|timed out|timeout|TLS|network error|socket hang up|ECONNRESET|ETIMEDOUT' "$ATTEMPT_LOG"; then
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                DELAY=$((15 * (2 ** (ATTEMPT - 1))))
                echo "Transient Rivet failure detected; retrying in ${DELAY}s" | tee -a "$RAW_LOG"
                sleep "$DELAY"
                continue
              fi
            fi

            echo "Non-transient or exhausted Rivet deployment failure" >&2
            break
          done

          cd ../..

          python - "$RAW_LOG" build/rivet-staging/deploy-sanitized.log <<'PY'
          import os
          import sys
          from pathlib import Path

          source = Path(sys.argv[1])
          raw = source.read_text(encoding="utf-8", errors="replace") if source.exists() else ""
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          Path(sys.argv[2]).write_text(raw, encoding="utf-8")
          PY

          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "Rivet deployment failed; status $DEPLOY_STATUS" >&2
            exit "$DEPLOY_STATUS"
          fi

          python - "$RAW_LOG" build/rivet-staging/control-url.txt <<'PY'
          import re
          import sys
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path
          from urllib.parse import urlsplit

          ansi = re.compile(r"\x1b\[[0-?]*[ -/]*[@-~]")
          text = ansi.sub("", Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace"))
          urls = re.findall(r"https://[^\s<>'\"]+", text)
          blocked_hosts = {
              "github.com",
              "npmjs.com",
              "www.npmjs.com",
              "rivet.dev",
              "cloud-api.rivet.dev",
              "dashboard.rivet.dev",
              "registry.rivet.dev",
          }
          candidates = []
          for raw in reversed(urls):
              raw = raw.rstrip(".,);]}")
              parts = urlsplit(raw)
              if not parts.scheme or not parts.netloc or parts.hostname in blocked_hosts:
                  continue
              origin = f"{parts.scheme}://{parts.netloc}"
              if origin not in candidates:
                  candidates.append(origin)

          if not candidates:
              raise SystemExit("No deployment endpoint URL was emitted by Rivet CLI")

          deadline = time.time() + 360
          last_error = "no deployment endpoint responded"
          while time.time() < deadline:
              for origin in candidates:
                  try:
                      request = urllib.request.Request(
                          f"{origin}/v1/health",
                          headers={"accept": "application/json", "user-agent": "colony-rivet-ci"},
                      )
                      with urllib.request.urlopen(request, timeout=10) as response:
                          body = response.read().decode("utf-8", errors="replace")
                          if response.status == 200 and '"ok":true' in body.replace(" ", ""):
                              Path(sys.argv[2]).write_text(origin + "\n", encoding="utf-8")
                              print(f"Resolved control-plane URL: {origin}")
                              raise SystemExit(0)
                  except (urllib.error.URLError, TimeoutError, OSError) as exc:
                      last_error = f"{origin}: {exc}"
              time.sleep(5)

          raise SystemExit(f"Could not verify deployed control-plane endpoint: {last_error}")
          PY

          CONTROL_URL="$(tr -d '\r\n' < build/rivet-staging/control-url.txt)"
          test -n "$CONTROL_URL"
          echo "RIVET_CONTROL_URL=$CONTROL_URL" >> "$GITHUB_ENV"

      - name: Verify deployed control plane and write status report
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 8 --retry-delay 3 --retry-max-time 180 --retry-all-errors \
            "$RIVET_CONTROL_URL/v1/health" \
            | tee build/rivet-staging/health.json
          curl --fail --silent --show-error --retry 8 --retry-delay 3 --retry-max-time 180 --retry-all-errors \
            "$RIVET_CONTROL_URL/v1/health/config" \
            | tee build/rivet-staging/health-config.json
          curl --fail --silent --show-error --retry 8 --retry-delay 3 --retry-max-time 180 --retry-all-errors \
            "$RIVET_CONTROL_URL/v1/regions" \
            | tee build/rivet-staging/regions.json

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("build/rivet-staging")
          health = json.loads((root / "health.json").read_text())
          config = json.loads((root / "health-config.json").read_text())
          regions = json.loads((root / "regions.json").read_text())
          checks = config.get("checks", {})
          limits = config.get("limits", {})

          if health.get("ok") is not True:
              raise SystemExit("Control-plane health endpoint did not return ok=true")
          for key in (
              "supabase_url",
              "supported_build_id",
              "protocol_version",
              "per_server_auth",
              "supabase_server_write",
              "regions",
          ):
              if checks.get(key) is not True:
                  raise SystemExit(f"Required control-plane check failed: {key}")
          if checks.get("allocator") is not False:
              raise SystemExit("Allocator unexpectedly reports ready before dedicated-server approval")
          if limits.get("min_players") != 2 or limits.get("max_players") != 10:
              raise SystemExit(f"Unexpected matchmaking limits: {limits}")
          if not isinstance(regions.get("regions"), list) or not regions["regions"]:
              raise SystemExit("No control-plane regions were returned")

          report = {
              "environment": "staging",
              "deployed_at": datetime.now(timezone.utc).isoformat(),
              "commit": os.environ.get("GITHUB_SHA", ""),
              "rivet_control_base_url": os.environ["RIVET_CONTROL_URL"],
              "supabase_url": f"https://{os.environ['SUPABASE_PROJECT_REF']}.supabase.co",
              "control_plane_live": True,
              "supabase_schema_ready": True,
              "min_players": 2,
              "max_players": 10,
              "game_server_allocator_ready": False,
              "game_server_hosting_status": "blocked_pending_official_rivet_game_server_path",
              "full_online_ready": False,
              "health": health,
              "health_config": config,
              "regions": regions,
          }
          (root / "deployment-report.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          print("RIVET_CONTROL_STAGING_LIVE")
          print("MAX_PLAYERS=10")
          print("FULL_ONLINE_READY=false")
          PY

      - name: Capture sanitized Rivet runtime logs
        if: always()
        working-directory: backend/rivet-control
        shell: bash
        run: |
          set +e
          RAW_LOG="$RUNNER_TEMP/rivet-control-runtime.log"
          npx --yes @rivetkit/cli@latest logs \
            --token "$RIVET_CLOUD_TOKEN" \
            --namespace staging \
            -n 100 \
            > "$RAW_LOG" 2>&1
          python - "$RAW_LOG" ../../build/rivet-staging/runtime-sanitized.log <<'PY'
          import os
          import sys
          from pathlib import Path

          source = Path(sys.argv[1])
          raw = source.read_text(encoding="utf-8", errors="replace") if source.exists() else ""
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  raw = raw.replace(value, "***")
          destination = Path(sys.argv[2])
          destination.parent.mkdir(parents=True, exist_ok=True)
          destination.write_text(raw, encoding="utf-8")
          PY
          true

      - name: Upload staging control-plane evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rivet-control-staging
          if-no-files-found: warn
          retention-days: 14
          path: build/rivet-staging/
