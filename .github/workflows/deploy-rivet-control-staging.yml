name: Deploy Rivet Full Online Staging

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-RIVET-FULL-ONLINE
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-rivet-control-staging.yml"
      - "backend/rivet-control/**"
      - "network/**"
      - "autoload/**"
      - "ui/**"
      - "tests/**"
      - "config/backend_config.json"
      - "core/boot.gd"
      - "project.godot"
      - "export_presets.cfg"

concurrency:
  group: colony-rivet-full-online-staging
  cancel-in-progress: true

jobs:
  deploy-full-online:
    if: ${{ github.event_name == 'push' || inputs.confirmation == 'DEPLOY-RIVET-FULL-ONLINE' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    environment: staging
    permissions:
      contents: read
    env:
      RIVET_CLOUD_TOKEN: ${{ secrets.RIVET_CLOUD_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPPORTED_BUILD_ID: PHASE-05.5-GOOGLE-BOT-BACKFILL
      PROTOCOL_VERSION: "4"
      MIN_PLAYERS: "1"
      MAX_PLAYERS: "10"
      QUEUE_TTL_SECONDS: "120"
      BOT_BACKFILL_WAIT_SECONDS: "30"
      REGIONS_JSON: >-
        [{"id":"eu","displayName":"Avrupa — Frankfurt","shortName":"EU-FRA","probeUrl":"","enabled":true,"providerRegion":"fra"}]
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/colony-debug.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install validation tools and Godot
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check gdtoolkit pglast pyyaml pillow
          tools/install_godot_ci.sh
          "$GODOT_BIN" --version

      - name: Configure Android SDK and signing
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35"
          keytool -keyalg RSA -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH" \
            -storepass android \
            -dname "CN=Android Debug,O=Colony Dominion,C=TR" \
            -validity 10000 \
            -deststoretype PKCS12
          "$GODOT_BIN" --headless --editor --path . \
            --script res://tools/configure_android_ci.gd

      - name: Resolve and validate staging credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RIVET_CLOUD_TOKEN" || { echo "RIVET_CLOUD_TOKEN is missing" >&2; exit 2; }
          test -n "$SUPABASE_SECRET_KEY" || { echo "SUPABASE_SECRET_KEY is missing" >&2; exit 2; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "SUPABASE_PROJECT_REF is missing" >&2; exit 2; }
          echo "::add-mask::$RIVET_CLOUD_TOKEN"
          echo "::add-mask::$SUPABASE_SECRET_KEY"
          [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || echo "::add-mask::$SUPABASE_ACCESS_TOKEN"
          mkdir -p build/rivet-staging build/android build/ci-logs

          if [ -z "${SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            test -n "${SUPABASE_ACCESS_TOKEN:-}" || {
              echo "SUPABASE_ACCESS_TOKEN is required to resolve the publishable key" >&2
              exit 2
            }
            curl --fail --silent --show-error \
              --retry 6 --retry-delay 3 --retry-all-errors \
              --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/api-keys?reveal=true" \
              > "$RUNNER_TEMP/supabase-api-keys.json"
            SUPABASE_PUBLISHABLE_KEY="$(python - "$RUNNER_TEMP/supabase-api-keys.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          items = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          for item in items:
              key = str(item.get("api_key", "")).strip()
              key_type = str(item.get("type", "")).strip().lower()
              name = str(item.get("name", "")).strip().lower()
              if key.startswith("sb_secret_") or key_type == "secret" or "service_role" in name:
                  continue
              if key_type == "publishable" or key.startswith("sb_publishable_") or name == "anon":
                  print(key)
                  raise SystemExit(0)
          raise SystemExit("No publishable Supabase key was found")
          PY
            )"
            echo "SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY" >> "$GITHUB_ENV"
          fi
          case "$SUPABASE_PUBLISHABLE_KEY" in
            sb_secret_*) echo "Refusing to embed a Supabase secret key" >&2; exit 2 ;;
          esac
          echo "::add-mask::$SUPABASE_PUBLISHABLE_KEY"

          python - <<'PY'
          import json
          import os

          regions = json.loads(os.environ["REGIONS_JSON"])
          if len(regions) != 1 or regions[0].get("id") != "eu":
              raise SystemExit("Staging must expose only the deployed EU region")
          if regions[0].get("providerRegion") != "fra" or not regions[0].get("enabled"):
              raise SystemExit("EU region must be enabled and mapped to Frankfurt")
          PY

      - name: Validate and build production sources
        shell: bash
        run: |
          set -euo pipefail
          python tools/validate_online_release.py
          gdlint autoload network ui gameplay tests
          gdformat --check autoload network ui gameplay tests
          npm --prefix backend/rivet-control install --no-audit --no-fund
          npm --prefix backend/rivet-control run typecheck
          npm --prefix backend/rivet-control run test:policy
          npm --prefix backend/rivet-control run build
          tools/build_dedicated_server.sh
          docker build \
            --file backend/rivet-control/Dockerfile \
            --tag "colony-rivet-full-online:${GITHUB_SHA:0:12}" \
            .

      - name: Deploy matching runtime to Rivet
        id: deploy
        timeout-minutes: 35
        shell: bash
        run: |
          set -uo pipefail
          RAW_LOG="$RUNNER_TEMP/rivet-deploy.log"
          ATTEMPT_LOG="$RUNNER_TEMP/rivet-deploy-attempt.log"
          SUPABASE_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          DEPLOY_STATUS=1
          : > "$RAW_LOG"
          for ATTEMPT in $(seq 1 4); do
            : > "$ATTEMPT_LOG"
            echo "===== RIVET DEPLOY ATTEMPT $ATTEMPT/4 =====" | tee -a "$RAW_LOG"
            set +e
            npx --yes @rivetkit/cli@latest deploy \
              --token "$RIVET_CLOUD_TOKEN" \
              --namespace staging \
              --dockerfile backend/rivet-control/Dockerfile \
              --build-context . \
              --yes \
              --image colony-rivet-full-online \
              --tag "${GITHUB_SHA:0:12}" \
              --cpu 2 \
              --memory 2Gi \
              --instance-request-concurrency 80 \
              --min-scale 0 \
              --max-scale 4 \
              --max-concurrent-actors 3 \
              --env "NODE_ENV=production" \
              --env "SUPABASE_URL=${SUPABASE_URL}" \
              --env "SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}" \
              --env "SUPPORTED_BUILD_ID=${SUPPORTED_BUILD_ID}" \
              --env "PROTOCOL_VERSION=${PROTOCOL_VERSION}" \
              --env "MIN_PLAYERS=${MIN_PLAYERS}" \
              --env "MAX_PLAYERS=${MAX_PLAYERS}" \
              --env "QUEUE_TTL_SECONDS=${QUEUE_TTL_SECONDS}" \
              --env "BOT_BACKFILL_WAIT_SECONDS=${BOT_BACKFILL_WAIT_SECONDS}" \
              --env "REGIONS_JSON=${REGIONS_JSON}" \
              --env "RIVET_STARTUP_CANARY=1" \
              2>&1 | tee "$ATTEMPT_LOG" | tee -a "$RAW_LOG"
            DEPLOY_STATUS=${PIPESTATUS[0]}
            set -e
            [ "$DEPLOY_STATUS" -eq 0 ] && break
            if grep -Eqi '401 Unauthorized|403 Forbidden|invalid token|validation failed|Invalid value specified' "$ATTEMPT_LOG"; then
              break
            fi
            if [ "$ATTEMPT" -lt 4 ]; then
              sleep $((15 * ATTEMPT))
            fi
          done
          python - "$RAW_LOG" build/rivet-staging/deploy.log <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          text = Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace")
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_ACCESS_TOKEN", "SUPABASE_SECRET_KEY", "SUPABASE_PUBLISHABLE_KEY"):
              value = os.environ.get(name, "")
              if value:
                  text = text.replace(value, "***")
          text = re.sub(r"\x1b\[[0-?]*[ -/]*[@-~]", "", text)
          Path(sys.argv[2]).write_text(text, encoding="utf-8")
          PY
          test "$DEPLOY_STATUS" -eq 0
          grep -Eqi 'pool status[[:space:]]+status=ready' build/rivet-staging/deploy.log

      - name: Discover and verify the live control gateway
        timeout-minutes: 12
        shell: bash
        run: |
          set -euo pipefail
          FOUND=0
          for ATTEMPT in $(seq 1 60); do
            set +e
            (
              cd backend/rivet-control
              npx --yes @rivetkit/cli@latest logs \
                --token "$RIVET_CLOUD_TOKEN" \
                --namespace staging \
                -n 1200
            ) > "$RUNNER_TEMP/rivet-runtime.log" 2>&1
            LOG_STATUS=$?
            set -e
            if [ "$LOG_STATUS" -eq 0 ]; then
              python - "$RUNNER_TEMP/rivet-runtime.log" build/rivet-staging/runtime.log <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          text = Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace")
          for name in ("RIVET_CLOUD_TOKEN", "SUPABASE_SECRET_KEY"):
              value = os.environ.get(name, "")
              if value:
                  text = text.replace(value, "***")
          text = re.sub(r"\x1b\[[0-?]*[ -/]*[@-~]", "", text)
          Path(sys.argv[2]).write_text(text, encoding="utf-8")
          PY
              if grep -q 'RIVET_GAME_ACTOR_CANARY_OK' build/rivet-staging/runtime.log \
                && grep -q 'RIVET_PUBLIC_CONTROL_GATEWAY_READY' build/rivet-staging/runtime.log; then
                FOUND=1
                break
              fi
              if grep -Eq 'RIVET_GAME_ACTOR_CANARY_FAILED|RIVET_FULL_ONLINE_BOOTSTRAP_FAILED' build/rivet-staging/runtime.log; then
                cat build/rivet-staging/runtime.log >&2
                exit 1
              fi
            fi
            sleep 10
          done
          test "$FOUND" -eq 1

          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          text = Path("build/rivet-staging/runtime.log").read_text(encoding="utf-8", errors="replace")
          payload = None
          for line in reversed(text.splitlines()):
              if "RIVET_PUBLIC_CONTROL_GATEWAY_READY" not in line:
                  continue
              match = re.search(r'\{.*"marker"\s*:\s*"RIVET_PUBLIC_CONTROL_GATEWAY_READY".*\}', line)
              if not match:
                  continue
              candidate = json.loads(match.group(0))
              if candidate.get("health_verified") is True:
                  payload = candidate
                  break
          if payload is None:
              raise SystemExit("Public control gateway marker was not found")
          base = str(payload.get("public_base_url", "")).strip()
          parsed = urllib.parse.urlsplit(base)
          if parsed.scheme != "https" or not parsed.netloc or not parsed.path.rstrip("/").endswith("/request"):
              raise SystemExit("Public control gateway is invalid")

          def endpoint(path: str) -> str:
              current = urllib.parse.urlsplit(base)
              full_path = current.path.rstrip("/") + "/" + path.lstrip("/")
              return urllib.parse.urlunsplit(
                  (current.scheme, current.netloc, full_path, current.query, "")
              )

          def get_json(path: str) -> dict:
              request = urllib.request.Request(
                  endpoint(path),
                  headers={"Accept": "application/json", "Cache-Control": "no-cache"},
              )
              with urllib.request.urlopen(request, timeout=45) as response:
                  if response.status != 200:
                      raise SystemExit(f"{path} returned HTTP {response.status}")
                  return json.loads(response.read().decode("utf-8"))

          health = get_json("/v1/health")
          service_config = get_json("/v1/health/config")
          catalog = get_json("/v1/regions")
          if health.get("ok") is not True or service_config.get("ready") is not True:
              raise SystemExit("Rivet control service is not ready")
          regions = [region for region in catalog.get("regions", []) if region.get("enabled")]
          if len(regions) != 1 or regions[0].get("id") != "eu":
              raise SystemExit(f"Unexpected deployed region catalog: {regions}")
          if service_config.get("limits", {}).get("bot_backfill_wait_seconds") != 30:
              raise SystemExit("Bot backfill wait mismatch")

          probe_url = endpoint("/v1/health/ping")
          probe_request = urllib.request.Request(
              probe_url,
              headers={"Accept": "application/json", "Cache-Control": "no-cache"},
          )
          with urllib.request.urlopen(probe_request, timeout=45) as response:
              if response.status != 200:
                  raise SystemExit("EU probe endpoint is unavailable")

          Path("build/rivet-staging/public-control-url.txt").write_text(base + "\n", encoding="utf-8")
          client_config = {
              "environment": "production",
              "build_id": os.environ["SUPPORTED_BUILD_ID"],
              "protocol_version": int(os.environ["PROTOCOL_VERSION"]),
              "supabase_url": f"https://{os.environ['SUPABASE_PROJECT_REF']}.supabase.co",
              "supabase_publishable_key": os.environ["SUPABASE_PUBLISHABLE_KEY"],
              "rivet_control_base_url": base,
              "persist_refresh_token": True,
              "region_probe_interval_seconds": 20.0,
              "region_probe_timeout_seconds": 4.0,
              "regions": [
                  {
                      "id": "eu",
                      "display_name": "Avrupa — Frankfurt",
                      "short_name": "EU-FRA",
                      "probe_url": probe_url,
                      "enabled": True,
                  }
              ],
          }
          Path("config/backend_config.json").write_text(
              json.dumps(client_config, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          report = {
              "runtime_build_id": os.environ["SUPPORTED_BUILD_ID"],
              "protocol_version": int(os.environ["PROTOCOL_VERSION"]),
              "region": "eu",
              "provider_region": "fra",
              "query_safe_probe": True,
              "bot_backfill_wait_seconds": 30,
          }
          Path("build/rivet-staging/live-verification.json").write_text(
              json.dumps(report, indent=2) + "\n",
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as output:
              output.write(f"RIVET_CONTROL_BASE_URL={base}\n")
          PY

      - name: Build configured Android staging APK
        timeout-minutes: 18
        shell: bash
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path . --editor --quit 2>&1 \
            | tee build/rivet-staging/godot-import.log
          if grep -Eq 'SCRIPT ERROR:|Parse Error:|Compile Error:|Failed to load script' build/rivet-staging/godot-import.log; then
            exit 1
          fi
          "$GODOT_BIN" --headless --path . \
            --script res://tests/google_oauth_bot_backfill_test.gd
          "$GODOT_BIN" --headless --path . \
            --export-debug "Android" \
            build/android/colony-dominion-rivet-staging.apk \
            2>&1 | tee build/rivet-staging/android-export.log
          test -s build/android/colony-dominion-rivet-staging.apk
          unzip -t build/android/colony-dominion-rivet-staging.apk >/dev/null
          sha256sum build/android/colony-dominion-rivet-staging.apk \
            | tee build/android/SHA256SUMS.txt
          stat --printf='%s\n' build/android/colony-dominion-rivet-staging.apk \
            > build/android/apk-size-bytes.txt

      - name: Upload deployed APK and diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: colony-dominion-rivet-staging-apk
          retention-days: 14
          if-no-files-found: warn
          path: |
            build/android/colony-dominion-rivet-staging.apk
            build/android/SHA256SUMS.txt
            build/android/apk-size-bytes.txt
            build/rivet-staging/
