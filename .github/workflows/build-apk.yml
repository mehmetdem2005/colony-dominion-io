name: Build Android APK

# Builds the canonical signed Android APK with native Google Credential Manager,
# independent of the Rivet deploy/verification gate. The
# APK embeds config/backend_config.json (Supabase + Rivet already wired), so it
# is installable and online-capable. Download the artifact from the run page.
#
# Every Godot / sdkmanager invocation is wrapped in `timeout` and split into its
# own step so a hang fails fast with a pinpointed cause instead of burning the
# full job budget. Logs upload even on failure for diagnosis.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-apk.yml"
      - "android_plugins/**"
      - "android/plugins/**"
      - "autoload/**"
      - "network/**"
      - "ui/**"
      - "config/backend_config.json"
      - "export_presets.cfg"
      - "tools/configure_android_ci.gd"
      - "tools/prepare_android_native_build.sh"
      - ".github/apk-trigger.txt"

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/colony-debug.keystore
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Godot and export templates
        run: |
          set -euxo pipefail
          tools/install_godot_ci.sh
          "$GODOT_BIN" --version

      - name: Install Android SDK packages
        run: |
          set -euxo pipefail
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | timeout 180 "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          timeout 600 "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35"
          echo "SDK_PACKAGES_OK"

      - name: Configure APK signing identity
        run: |
          set -euo pipefail
          mkdir -p build
          test -n "${ANDROID_KEYSTORE_BASE64:-}" || {
            echo "::error::ANDROID_KEYSTORE_BASE64 is required. Native Google sign-in cannot ship with a one-use signing certificate."
            exit 2
          }
          test -n "${ANDROID_KEYSTORE_ALIAS:-}"
          test -n "${ANDROID_KEYSTORE_PASSWORD:-}"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode \
            > "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH"
          KEY_ALIAS="$ANDROID_KEYSTORE_ALIAS"
          KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          test -f "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          keytool -list -v \
            -keystore "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH" \
            -storepass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" \
            | sed -n 's/^[[:space:]]*SHA1: /SHA1: /p' \
            | tee build/android-signing-sha1.txt
          echo "KEYSTORE_OK"

      - name: Build native Google identity plugin and Gradle template
        run: |
          set -euxo pipefail
          tools/prepare_android_native_build.sh

      - name: Import project resources (headless)
        run: |
          set -uxo pipefail
          mkdir -p build/android
          timeout 900 "$GODOT_BIN" --headless --path . --import \
            2>&1 | tee build/android/import.log
          echo "IMPORT_EXIT=${PIPESTATUS[0]}"

      - name: Configure Godot Android editor settings
        run: |
          set -euxo pipefail
          "$GODOT_BIN" --headless --editor --path . \
            --script res://tools/configure_android_ci.gd

      - name: Export debug APK
        run: |
          set -uxo pipefail
          timeout 1500 "$GODOT_BIN" --headless --path . \
            --export-debug "Android" \
            "$GITHUB_WORKSPACE/build/android/colony-dominion.apk" \
            2>&1 | tee build/android/export.log
          echo "EXPORT_EXIT=${PIPESTATUS[0]}"
          test -s build/android/colony-dominion.apk
          unzip -t build/android/colony-dominion.apk >/dev/null
          sha256sum build/android/colony-dominion.apk | tee build/android/SHA256SUMS.txt
          stat --printf='APK size: %s bytes\n' build/android/colony-dominion.apk

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: colony-dominion-apk
          retention-days: 14
          if-no-files-found: warn
          path: |
            build/android/colony-dominion.apk
            build/android/SHA256SUMS.txt
            build/android/import.log
            build/android/export.log
            build/android-signing-sha1.txt

      - name: Publish APK to a direct-download Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Colony Dominion.io — Son APK"
          body: |
            Android Credential Manager ile oyun içi yerel Google hesap seçimi,
            Frankfurt sunucu yönlendirmesi ve eşleştirme düzeltmelerini içeren APK.
            Doğrudan indir: colony-dominion.apk
            Bütünlük doğrulaması için SHA256SUMS.txt.
            Her yeni derlemede bu sürüm güncellenir.
          files: |
            build/android/colony-dominion.apk
            build/android/SHA256SUMS.txt
          fail_on_unmatched_files: true
