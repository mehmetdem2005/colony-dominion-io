name: Deploy Supabase Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/supabase/**"
      - "tools/deploy_supabase_staging.py"
      - "tools/deploy_online_stack.py"
      - "config/backend_config.json"
      - ".github/workflows/deploy-supabase-staging.yml"

concurrency:
  group: colony-supabase-staging
  cancel-in-progress: true

jobs:
  deploy-supabase:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: staging
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      COLONY_PROJECT_NAME: ${{ vars.COLONY_PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install pglast pyyaml

      - name: Audit complete online deployment source
        run: |
          mkdir -p build/diagnostics
          python tools/audit_online_deployment.py --strict \
            2>&1 | tee build/diagnostics/deployment-audit.log

      - name: Preflight Supabase Management API
        timeout-minutes: 3
        run: |
          set -o pipefail
          python tools/deploy_supabase_staging.py \
            --project-name "${COLONY_PROJECT_NAME:-colony.io}" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --preflight-only \
            2>&1 | tee build/diagnostics/supabase-preflight.log

      - name: Apply and verify Supabase schema
        timeout-minutes: 10
        run: |
          set -o pipefail
          python tools/deploy_supabase_staging.py \
            --project-name "${COLONY_PROJECT_NAME:-colony.io}" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            2>&1 | tee build/diagnostics/supabase-deploy.log

      - name: Verify deployment report
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("deployment/last_deployment.json")
          if not report_path.is_file():
              raise SystemExit("deployment report is missing")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          if report.get("status") != "complete":
              raise SystemExit("deployment report is incomplete")
          if report.get("deployment_environment") != "staging":
              raise SystemExit("deployment report is not labelled as staging")
          supabase = report.get("supabase", {})
          expected_ref = os.environ.get("SUPABASE_PROJECT_REF", "")
          if expected_ref and supabase.get("project_ref") != expected_ref:
              raise SystemExit("deployment report points to the wrong Supabase project")
          verification = supabase.get("verification", {})
          if verification.get("verified_table_count", 0) < 12:
              raise SystemExit("Supabase table verification did not pass")
          for key in (
              "authoritative_result_function",
              "leaderboard_function",
              "ranked_summary_function",
          ):
              if not verification.get(key):
                  raise SystemExit(f"Supabase function verification failed: {key}")
          if len(supabase.get("migrations_applied", [])) < 5:
              raise SystemExit("not all expected Supabase migrations were applied")
          auth_confirmation = supabase.get("auth_confirmation", {})
          site_url = str(auth_confirmation.get("site_url", ""))
          if not site_url.startswith("https://") or "localhost" in site_url.lower():
              raise SystemExit("Supabase Auth confirmation URL is not production-safe")
          for key in ("redirect_allowlisted", "localhost_removed"):
              if not auth_confirmation.get(key):
                  raise SystemExit(f"Supabase Auth confirmation verification failed: {key}")
          template_status = str(auth_confirmation.get("template_status", ""))
          if template_status not in {
              "deployed",
              "blocked_free_tier_default_provider",
          }:
              raise SystemExit(
                  f"Unexpected confirmation template status: {template_status}"
              )
          if template_status == "deployed":
              for key in ("confirmation_template", "confirmation_subject"):
                  if not auth_confirmation.get(key):
                      raise SystemExit(
                          f"Supabase Auth branding verification failed: {key}"
                      )
          print("SUPABASE_STAGING_SCHEMA_OK")
          PY

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: colony-supabase-staging
          if-no-files-found: warn
          retention-days: 14
          path: |
            deployment/deployment_audit.json
            deployment/last_deployment.json
            config/backend_config.json
            backend/supabase/email_templates/confirmation.html
            build/diagnostics/
