name: Deploy Supabase Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/supabase/**"
      - "tools/deploy_supabase_staging.py"
      - "tools/deploy_online_stack.py"
      - "config/backend_config.json"
      - ".github/workflows/deploy-supabase-staging.yml"

concurrency:
  group: colony-supabase-staging
  cancel-in-progress: true

jobs:
  deploy-supabase:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: staging
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      COLONY_PROJECT_NAME: ${{ vars.COLONY_PROJECT_NAME }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      AUTH_SMTP_ADMIN_EMAIL: ${{ vars.AUTH_SMTP_ADMIN_EMAIL }}
      AUTH_SMTP_SENDER_NAME: ${{ vars.AUTH_SMTP_SENDER_NAME || 'Colony Dominion.io' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install pglast pyyaml

      - name: Audit complete online deployment source
        run: |
          mkdir -p build/diagnostics
          python tools/audit_online_deployment.py --strict \
            2>&1 | tee build/diagnostics/deployment-audit.log

      - name: Preflight Supabase Management API
        timeout-minutes: 3
        run: |
          set -o pipefail
          python tools/deploy_supabase_staging.py \
            --project-name "${COLONY_PROJECT_NAME:-colony.io}" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --preflight-only \
            2>&1 | tee build/diagnostics/supabase-preflight.log

      - name: Deploy public auth confirmation Edge Function
        timeout-minutes: 8
        working-directory: backend
        run: |
          set -euo pipefail
          npx --yes supabase@latest functions deploy auth-confirmed \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt

      - name: Deploy Google OAuth handoff Edge Function
        timeout-minutes: 8
        working-directory: backend
        run: |
          set -euo pipefail
          npx --yes supabase@latest functions deploy oauth-google-handoff \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt

      - name: Verify Google OAuth handoff Edge Function
        timeout-minutes: 3
        run: |
          set -euo pipefail
          FUNCTION_URL="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/oauth-google-handoff/health"
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            "$FUNCTION_URL" \
            | tee build/diagnostics/google-oauth-handoff-health.json \
            | grep -q 'colony-google-oauth-handoff'

      - name: Verify public auth confirmation Edge Function
        timeout-minutes: 3
        run: |
          set -euo pipefail
          FUNCTION_URL="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/auth-confirmed"
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            "$FUNCTION_URL" \
            | tee build/diagnostics/auth-confirmation-page.html \
            | grep -q "E-posta adresin doğrulandı"

      - name: Apply and verify Supabase schema
        timeout-minutes: 10
        run: |
          set -o pipefail
          python tools/deploy_supabase_staging.py \
            --project-name "${COLONY_PROJECT_NAME:-colony.io}" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            2>&1 | tee build/diagnostics/supabase-deploy.log

      - name: Verify deployment report
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("deployment/last_deployment.json")
          if not report_path.is_file():
              raise SystemExit("deployment report is missing")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          if report.get("status") != "complete":
              raise SystemExit("deployment report is incomplete")
          if report.get("deployment_environment") != "staging":
              raise SystemExit("deployment report is not labelled as staging")
          supabase = report.get("supabase", {})
          expected_ref = os.environ.get("SUPABASE_PROJECT_REF", "")
          if expected_ref and supabase.get("project_ref") != expected_ref:
              raise SystemExit("deployment report points to the wrong Supabase project")
          verification = supabase.get("verification", {})
          if verification.get("verified_table_count", 0) < 13:
              raise SystemExit("Supabase table verification did not pass")
          for key in (
              "authoritative_result_function",
              "leaderboard_function",
              "ranked_summary_function",
          ):
              if not verification.get(key):
                  raise SystemExit(f"Supabase function verification failed: {key}")
          if len(supabase.get("migrations_applied", [])) < 5:
              raise SystemExit("not all expected Supabase migrations were applied")
          auth_confirmation = supabase.get("auth_confirmation", {})
          site_url = str(auth_confirmation.get("site_url", ""))
          expected_site_url = (
              f"https://{expected_ref}.supabase.co/functions/v1/auth-confirmed"
          )
          if site_url != expected_site_url:
              raise SystemExit("Supabase Auth site URL does not point to the Edge Function")
          for key in ("redirect_allowlisted", "google_callback_allowlisted", "localhost_removed"):
              if not auth_confirmation.get(key):
                  raise SystemExit(f"Supabase Auth confirmation verification failed: {key}")
          smtp = supabase.get("smtp", {})
          smtp_credentials_present = bool(
              os.environ.get("RESEND_API_KEY", "").strip()
              and os.environ.get("AUTH_SMTP_ADMIN_EMAIL", "").strip()
          )
          expected_smtp_status = "configured" if smtp_credentials_present else "credentials_missing"
          if str(smtp.get("status", "")) != expected_smtp_status:
              raise SystemExit(f"Unexpected SMTP status: {smtp.get('status')}")
          if smtp_credentials_present and not smtp.get("configured"):
              raise SystemExit("Resend credentials exist but SMTP is not configured")
          google_oauth = supabase.get("google_oauth", {})
          google_status = str(google_oauth.get("status", ""))
          credentials_present = bool(
              os.environ.get("GOOGLE_OAUTH_CLIENT_ID", "").strip()
              and os.environ.get("GOOGLE_OAUTH_CLIENT_SECRET", "").strip()
          )
          expected_google_status = "enabled" if credentials_present else "credentials_missing"
          if google_status != expected_google_status:
              raise SystemExit(
                  f"Unexpected Google OAuth provider status: {google_status}"
              )
          if credentials_present and not google_oauth.get("enabled"):
              raise SystemExit("Google OAuth credentials exist but provider is not enabled")
          template_status = str(auth_confirmation.get("template_status", ""))
          if template_status not in {
              "deployed",
              "blocked_free_tier_default_provider",
          }:
              raise SystemExit(
                  f"Unexpected confirmation template status: {template_status}"
              )
          if template_status == "deployed":
              for key in ("confirmation_template", "confirmation_subject"):
                  if not auth_confirmation.get(key):
                      raise SystemExit(
                          f"Supabase Auth branding verification failed: {key}"
                      )
          print("SUPABASE_STAGING_SCHEMA_OK")
          PY

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: colony-supabase-staging
          if-no-files-found: warn
          retention-days: 14
          path: |
            deployment/deployment_audit.json
            deployment/last_deployment.json
            config/backend_config.json
            backend/supabase/email_templates/confirmation.html
            backend/supabase/functions/auth-confirmed/index.ts
            backend/supabase/functions/oauth-google-handoff/index.ts
            backend/supabase/migrations/202607210006_google_oauth_handoffs.sql
            build/diagnostics/
