name: Retry Rivet Staging Publish

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Optional successful Diagnose Godot Source run id
        required: false
        type: string

concurrency:
  group: colony-rivet-staging-publish
  cancel-in-progress: true

jobs:
  publish-and-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: staging
    permissions:
      contents: read
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      RIVET_CLOUD_TOKEN: ${{ secrets.RIVET_CLOUD_TOKEN }}
      RIVET_ALLOCATOR_CLOUD_TOKEN: ${{ secrets.RIVET_ALLOCATOR_CLOUD_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      COLONY_PROJECT_NAME: ${{ vars.COLONY_PROJECT_NAME }}
      RIVET_PROJECT: ${{ vars.RIVET_PROJECT }}
      RIVET_ORG: ${{ vars.RIVET_ORG }}
      RIVET_CONTROL_URL: ${{ vars.RIVET_CONTROL_URL }}
      RIVET_ENVIRONMENT: staging
      RIVET_NAMESPACE: staging
      RIVET_GAME_SERVER_BUILD_TAG: colony-server-05-3-staging
      GAME_SERVER_IMAGE_TAG: colony-dominion-server:05.3.1-staging
      REGIONS_JSON: ${{ vars.REGIONS_JSON }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Recover validated dedicated-server artifact
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_RUN_ID="${{ inputs.source_run_id }}"
          if [[ -z "$SOURCE_RUN_ID" ]]; then
            SOURCE_RUN_ID="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow diagnose-godot.yml \
                --status success \
                --limit 1 \
                --json databaseId \
                --jq '.[0].databaseId'
            )"
          fi
          test -n "$SOURCE_RUN_ID"
          echo "Using validated source run: $SOURCE_RUN_ID"
          rm -rf build/recovered build/server
          mkdir -p build/recovered build/server build/diagnostics
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name source-diagnostics \
            --dir build/recovered
          test -s build/recovered/server/colony-dominion-server.x86_64
          test -s build/recovered/server/colony-dominion-server.pck
          cp build/recovered/server/colony-dominion-server.x86_64 build/server/
          cp build/recovered/server/colony-dominion-server.pck build/server/
          chmod +x build/server/colony-dominion-server.x86_64
          echo "SOURCE_RUN_ID=$SOURCE_RUN_ID" >> "$GITHUB_ENV"

      - name: Build Godot game-server image
        timeout-minutes: 8
        run: IMAGE_TAG="$GAME_SERVER_IMAGE_TAG" tools/build_game_server_image.sh

      - name: Publish game-server build to Rivet
        timeout-minutes: 10
        run: tools/publish_rivet_game_server.sh

      - name: Apply resolved Rivet context
        run: |
          test -s build/rivet-context.env
          grep -E '^RIVET_(PROJECT|ENVIRONMENT|PROJECT_ID|ENVIRONMENT_ID)=' build/rivet-context.env >> "$GITHUB_ENV"
          echo "Resolved Rivet project and environment loaded for deployment."

      - name: Deploy Supabase schema and Rivet control plane
        timeout-minutes: 12
        run: |
          tools/deploy_online_stack.sh \
            --project-name "${COLONY_PROJECT_NAME:-colony.io}" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --rivet-project "$RIVET_PROJECT" \
            --rivet-environment "$RIVET_ENVIRONMENT" \
            --game-server-build-tag "$RIVET_GAME_SERVER_BUILD_TAG"

      - name: Upload retry diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rivet-staging-retry-diagnostics
          if-no-files-found: warn
          retention-days: 7
          path: |
            build/diagnostics/
            build/rivet-context.env
            deployment/last_deployment.json
            config/backend_config.json
