name: Full Online Branch Validation

on:
  push:
    branches: [full-online-completion]
    paths-ignore:
      - "deployment/status/full-online-branch-validation.json"

concurrency:
  group: full-online-branch-validation
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: python -m pip install --disable-pip-version-check gdtoolkit pglast pyyaml pillow

      - name: Install Godot and templates
        run: tools/install_godot_ci.sh

      - name: Validate release architecture
        id: architecture
        run: python tools/validate_online_release.py

      - name: Typecheck and build Rivet runtime
        id: typescript
        working-directory: backend/rivet-control
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run typecheck
          npm run build

      - name: Lint and format GDScript
        id: gdscript
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find . -type f -name '*.gd' \
              -not -path './.godot/*' \
              -not -path './.godot-bin/*' \
              -not -path './build/*' \
              | sort
          )
          test "${#files[@]}" -gt 0
          gdlint "${files[@]}"
          gdformat --check "${files[@]}"

      - name: Parse, test and export dedicated server
        id: godot
        run: tools/build_dedicated_server.sh

      - name: Build embedded Godot Rivet image
        id: docker
        run: |
          set -euo pipefail
          docker build \
            -f backend/rivet-control/Dockerfile \
            -t colony-rivet-full-online:${GITHUB_SHA:0:12} \
            .
          docker image inspect colony-rivet-full-online:${GITHUB_SHA:0:12} \
            --format '{{.Id}} {{.Architecture}}' \
            | tee build/full-online-container.txt
          docker run --rm \
            --entrypoint /usr/local/bin/godot \
            colony-rivet-full-online:${GITHUB_SHA:0:12} \
            --headless --version \
            | tee build/full-online-godot-version.txt
          grep -q '4.6.3' build/full-online-godot-version.txt

      - name: Upload full-online evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: full-online-branch-validation
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/ci-logs/
            build/full-online-container.txt
            build/full-online-godot-version.txt
            build/server/

      - name: Persist validation status
        if: always()
        env:
          ARCHITECTURE_OUTCOME: ${{ steps.architecture.outcome }}
          TYPESCRIPT_OUTCOME: ${{ steps.typescript.outcome }}
          GDSCRIPT_OUTCOME: ${{ steps.gdscript.outcome }}
          GODOT_OUTCOME: ${{ steps.godot.outcome }}
          DOCKER_OUTCOME: ${{ steps.docker.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment/status
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          steps = {
              "architecture": os.environ.get("ARCHITECTURE_OUTCOME", "unknown"),
              "typescript": os.environ.get("TYPESCRIPT_OUTCOME", "unknown"),
              "gdscript": os.environ.get("GDSCRIPT_OUTCOME", "unknown"),
              "godot": os.environ.get("GODOT_OUTCOME", "unknown"),
              "docker": os.environ.get("DOCKER_OUTCOME", "unknown"),
          }
          success = all(value == "success" for value in steps.values())
          payload = {
              "success": success,
              "validated_sha": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "recorded_at": datetime.now(timezone.utc).isoformat(),
              "steps": steps,
              "provider": "rivet_only",
              "protocol_version": 4,
              "max_players": 10,
          }
          Path("deployment/status/full-online-branch-validation.json").write_text(
              json.dumps(payload, indent=2) + "\n", encoding="utf-8"
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin full-online-completion
          git rebase origin/full-online-completion
          git add deployment/status/full-online-branch-validation.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record full-online branch validation status"
          git push origin HEAD:full-online-completion
