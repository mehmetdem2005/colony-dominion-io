name: Verify Auth Confirmation Live

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/verify-auth-confirmation-live.yml"

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    environment: staging
    env:
      TARGET_SHA: 64ce23196bfc9314f3308b15073c3f473dacc02b
      RIVET_RUN_ID: "29844292879"
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Locate merged Supabase deployment run
        run: |
          set -euo pipefail
          mkdir -p build/live-auth-verification
          SUPABASE_RUN_ID=""
          for _ in $(seq 1 120); do
            SUPABASE_RUN_ID="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow deploy-supabase-staging.yml \
                --branch main \
                --limit 30 \
                --json databaseId,headSha \
                --jq ".[] | select(.headSha == \"$TARGET_SHA\") | .databaseId" \
                | head -n 1
            )"
            [ -n "$SUPABASE_RUN_ID" ] && break
            sleep 5
          done
          test -n "$SUPABASE_RUN_ID" || {
            echo "Supabase deployment workflow run was not found" >&2
            exit 2
          }
          echo "SUPABASE_RUN_ID=$SUPABASE_RUN_ID" >> "$GITHUB_ENV"
          python - "$RIVET_RUN_ID" "$SUPABASE_RUN_ID" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          Path("build/live-auth-verification/deployment-runs.json").write_text(
              json.dumps(
                  {
                      "target_sha": os.environ["TARGET_SHA"],
                      "rivet_run_id": int(sys.argv[1]),
                      "supabase_run_id": int(sys.argv[2]),
                  },
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Wait for Rivet confirmation route deployment
        run: |
          set -euo pipefail
          gh run watch "$RIVET_RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
          gh run view "$RIVET_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,url,workflowName,createdAt,updatedAt \
            > build/live-auth-verification/rivet-deployment.json

      - name: Wait for Supabase redirect deployment
        run: |
          set -euo pipefail
          gh run watch "$SUPABASE_RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
          gh run view "$SUPABASE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,url,workflowName,createdAt,updatedAt \
            > build/live-auth-verification/supabase-deployment.json

      - name: Verify live confirmation route and Supabase Auth configuration
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          config = json.loads(Path("config/backend_config.json").read_text(encoding="utf-8"))
          base = urllib.parse.urlsplit(str(config["rivet_control_base_url"]))
          route = urllib.parse.urlunsplit(
              (
                  base.scheme,
                  base.netloc,
                  base.path.rstrip("/") + "/v1/auth/confirmed",
                  base.query,
                  "",
              )
          )
          if not route.startswith("https://") or "localhost" in route.lower():
              raise SystemExit("computed confirmation route is not production-safe")

          route_body = ""
          route_status = 0
          last_error = ""
          for _ in range(30):
              try:
                  request = urllib.request.Request(
                      route,
                      headers={"User-Agent": "Colony-Live-Auth-Verification/1.0"},
                  )
                  with urllib.request.urlopen(request, timeout=20) as response:
                      route_status = response.status
                      route_body = response.read().decode("utf-8", errors="replace")
                  if route_status == 200 and "E-posta adresin doğrulandı" in route_body:
                      break
                  last_error = f"unexpected route response: {route_status}"
              except Exception as exc:
                  last_error = str(exc)
              time.sleep(5)
          else:
              raise SystemExit(f"live confirmation route did not become ready: {last_error}")

          token = os.environ.get("SUPABASE_ACCESS_TOKEN", "").strip()
          project_ref = os.environ.get("SUPABASE_PROJECT_REF", "").strip()
          if not token or not project_ref:
              raise SystemExit("Supabase staging verification credentials are missing")
          request = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/{project_ref}/config/auth",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/json",
                  "User-Agent": "Colony-Live-Auth-Verification/1.0",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              auth_config = json.loads(response.read().decode("utf-8"))

          site_url = str(auth_config.get("site_url", "")).strip()
          allow_list = str(auth_config.get("uri_allow_list", ""))
          template = str(auth_config.get("mailer_templates_confirmation_content", ""))
          subject = str(auth_config.get("mailer_subjects_confirmation", ""))
          failures = []
          if site_url != route:
              failures.append("site_url does not match the live confirmation route")
          if route not in allow_list:
              failures.append("confirmation route is absent from uri_allow_list")
          if (
              "localhost" in site_url.lower()
              or "localhost" in allow_list.lower()
              or "127.0.0.1" in allow_list
          ):
              failures.append("loopback URL remains in Supabase Auth redirect configuration")
          if failures:
              raise SystemExit("; ".join(failures))

          template_deployed = (
              "{{ .ConfirmationURL }}" in template
              and "E-POSTAYI DOĞRULA" in template
              and "Colony Dominion.io" in subject
          )
          report = {
              "ok": True,
              "target_sha": os.environ["TARGET_SHA"],
              "confirmation_route": route,
              "route_status": route_status,
              "site_url_matches": True,
              "allow_list_matches": True,
              "localhost_removed": True,
              "confirmation_template_deployed": template_deployed,
              "template_status": (
                  "deployed"
                  if template_deployed
                  else "blocked_free_tier_default_provider"
              ),
          }
          Path("build/live-auth-verification/report.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False))
          PY

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: colony-live-auth-verification
          retention-days: 2
          if-no-files-found: warn
          path: build/live-auth-verification/
