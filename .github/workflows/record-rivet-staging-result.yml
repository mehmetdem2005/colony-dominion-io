name: Record Rivet Staging Result

on:
  workflow_run:
    workflows: ["Deploy Rivet Control Staging"]
    types: [completed]

concurrency:
  group: record-rivet-staging-result
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  record-result:
    if: ${{ github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Collect sanitized deployment evidence
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT_NAME: ${{ github.event.workflow_run.event }}
        shell: bash
        run: |
          set -euo pipefail
          STATUS_DIR="deployment/status"
          TEMP_DIR="$RUNNER_TEMP/rivet-result"
          mkdir -p "$STATUS_DIR" "$TEMP_DIR/artifact"

          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed \
            > "$TEMP_DIR/failed.log" 2>&1 || true
          tail -n 400 "$TEMP_DIR/failed.log" > "$STATUS_DIR/rivet-staging-latest-failure.log" || true

          gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name rivet-control-staging \
            --dir "$TEMP_DIR/artifact" \
            >/dev/null 2>&1 || true

          if [ -f "$TEMP_DIR/artifact/deployment-report.json" ]; then
            cp "$TEMP_DIR/artifact/deployment-report.json" "$STATUS_DIR/rivet-staging-latest-report.json"
          else
            rm -f "$STATUS_DIR/rivet-staging-latest-report.json"
          fi

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("deployment/status")
          failure_log = root / "rivet-staging-latest-failure.log"
          report = root / "rivet-staging-latest-report.json"
          payload = {
              "recorded_at": datetime.now(timezone.utc).isoformat(),
              "workflow": "Deploy Rivet Control Staging",
              "run_id": int(os.environ["RUN_ID"]),
              "run_attempt": int(os.environ.get("RUN_ATTEMPT", "1")),
              "conclusion": os.environ.get("RUN_CONCLUSION", "unknown"),
              "run_url": os.environ.get("RUN_URL", ""),
              "head_sha": os.environ.get("HEAD_SHA", ""),
              "event": os.environ.get("EVENT_NAME", ""),
              "failure_log_available": failure_log.exists() and failure_log.stat().st_size > 0,
              "deployment_report_available": report.exists(),
          }
          (root / "rivet-staging-latest.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit latest result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/status/
          if git diff --cached --quiet; then
            echo "No result change to commit"
            exit 0
          fi
          git commit -m "Record Rivet staging run ${{ github.event.workflow_run.id }} result"
          git push origin HEAD:main
