name: Diagnose OAuth Callback Live Deployment

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'rivet-live-deployment-monitor'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 9f972a3416142368189fb9c19152e361e3b4aea1
    steps:
      - uses: actions/checkout@v6
        with:
          ref: rivet-live-deployment-monitor
          fetch-depth: 1

      - name: Locate matching Supabase deployment
        shell: bash
        run: |
          set -euo pipefail
          REPO="$GITHUB_REPOSITORY"
          WORKFLOW="deploy-supabase-staging.yml"
          mkdir -p deployment/status
          RUN_ID=""
          for _ in $(seq 1 120); do
            RUN_ID="$(
              gh run list \
                --repo "$REPO" \
                --workflow "$WORKFLOW" \
                --branch main \
                --limit 60 \
                --json databaseId,headSha \
                --jq ".[] | select(.headSha == \"$TARGET_SHA\") | .databaseId" \
                | head -n 1
            )"
            [ -n "$RUN_ID" ] && break
            sleep 5
          done
          if [ -z "$RUN_ID" ]; then
            printf '{"target_sha":"%s","error":"matching_run_not_found"}\n' "$TARGET_SHA" \
              > deployment/status/supabase-oauth-live-run.json
            exit 0
          fi
          echo "SUPABASE_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          gh run view "$RUN_ID" \
            --repo "$REPO" \
            --json databaseId,status,conclusion,event,headSha,url,attempt,workflowName,createdAt,updatedAt \
            > deployment/status/supabase-oauth-live-run.json

      - name: Collect failed deployment logs and artifacts
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p deployment/status/supabase-live-evidence
          if [ -n "${SUPABASE_RUN_ID:-}" ]; then
            gh run view "$SUPABASE_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --log-failed \
              > deployment/status/supabase-oauth-live-failure.log 2>&1
            gh run download "$SUPABASE_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name colony-supabase-staging \
              --dir deployment/status/supabase-live-evidence \
              > deployment/status/supabase-artifact-download.log 2>&1
          fi
          true

      - name: Probe public callback without failing diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          CALLBACK_URL="https://mlwsxeqorlfqmxqxnfoo.supabase.co/functions/v1/oauth-google-handoff/callback/00000000-0000-4000-8000-000000000001"
          curl --silent --show-error \
            --dump-header deployment/status/public-oauth-callback.headers \
            --output deployment/status/public-oauth-callback.body \
            "$CALLBACK_URL" \
            > deployment/status/public-oauth-callback-curl.log 2>&1
          printf '%s\n' "$?" > deployment/status/public-oauth-callback-curl-status.txt
          true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: colony-oauth-callback-live-diagnostics
          retention-days: 2
          if-no-files-found: error
          path: deployment/status/
