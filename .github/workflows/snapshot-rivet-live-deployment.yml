name: Verify OAuth Callback Live Deployment

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'rivet-live-deployment-monitor'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 9f972a3416142368189fb9c19152e361e3b4aea1
    steps:
      - uses: actions/checkout@v6
        with:
          ref: rivet-live-deployment-monitor
          fetch-depth: 1

      - name: Locate and wait for matching Supabase deployment
        shell: bash
        run: |
          set -euo pipefail
          REPO="$GITHUB_REPOSITORY"
          WORKFLOW="deploy-supabase-staging.yml"
          mkdir -p deployment/status
          RUN_ID=""
          for _ in $(seq 1 300); do
            RUN_ID="$(
              gh run list \
                --repo "$REPO" \
                --workflow "$WORKFLOW" \
                --branch main \
                --limit 40 \
                --json databaseId,headSha \
                --jq ".[] | select(.headSha == \"$TARGET_SHA\") | .databaseId" \
                | head -n 1
            )"
            [ -n "$RUN_ID" ] && break
            sleep 5
          done
          test -n "$RUN_ID"
          echo "SUPABASE_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"

          set +e
          gh run watch "$RUN_ID" --repo "$REPO" --exit-status
          WATCH_STATUS=$?
          set -e
          gh run view "$RUN_ID" \
            --repo "$REPO" \
            --json databaseId,status,conclusion,event,headSha,url,attempt,workflowName,createdAt,updatedAt \
            > deployment/status/supabase-oauth-live-run.json
          if [ "$WATCH_STATUS" -ne 0 ]; then
            gh run view "$RUN_ID" --repo "$REPO" --log-failed \
              > deployment/status/supabase-oauth-live-failure.log 2>&1 || true
            exit "$WATCH_STATUS"
          fi

      - name: Download deployment verification artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment/status/supabase-live-evidence
          gh run download "$SUPABASE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name colony-supabase-staging \
            --dir deployment/status/supabase-live-evidence
          REPORT="$(find deployment/status/supabase-live-evidence -type f -name 'google-oauth-callback-verification.json' -print -quit)"
          test -n "$REPORT" && test -s "$REPORT"
          python - "$REPORT" <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          required = {
              "status": "verified",
              "inline": True,
              "utf8": True,
              "nosniff": True,
              "no_store": True,
              "csp_nonce": True,
              "secret_markers_absent": True,
          }
          for key, value in required.items():
              if report.get(key) != value:
                  raise SystemExit(f"Deployment callback verification mismatch: {key}")
          content_type = str(report.get("content_type", "")).lower().replace(" ", "")
          if content_type != "text/html;charset=utf-8":
              raise SystemExit(f"Unexpected deployed content type: {content_type}")
          PY

      - name: Independently verify public callback rendering
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_REF="mlwsxeqorlfqmxqxnfoo"
          CALLBACK_ID="00000000-0000-4000-8000-000000000001"
          CALLBACK_URL="https://${PROJECT_REF}.supabase.co/functions/v1/oauth-google-handoff/callback/${CALLBACK_ID}"
          HEADER_FILE="$RUNNER_TEMP/oauth-live.headers"
          BODY_FILE="$RUNNER_TEMP/oauth-live.html"
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            --dump-header "$HEADER_FILE" \
            --output "$BODY_FILE" \
            "$CALLBACK_URL"
          python - "$HEADER_FILE" "$BODY_FILE" <<'PY'
          import json
          import sys
          from pathlib import Path

          raw_headers = Path(sys.argv[1]).read_text(encoding="iso-8859-1").replace("\r\n", "\n")
          blocks = [block for block in raw_headers.split("\n\n") if block.startswith("HTTP/")]
          if not blocks:
              raise SystemExit("Public callback headers are missing")
          headers = {}
          for line in blocks[-1].splitlines()[1:]:
              if ":" in line:
                  key, value = line.split(":", 1)
                  headers[key.strip().lower()] = value.strip()
          content_type = headers.get("content-type", "").lower().replace(" ", "")
          if content_type != "text/html;charset=utf-8":
              raise SystemExit(f"Public callback content type is wrong: {content_type!r}")
          if headers.get("content-disposition", "").lower() != "inline":
              raise SystemExit("Public callback is not inline")
          if headers.get("x-content-type-options", "").lower() != "nosniff":
              raise SystemExit("Public callback is missing nosniff")
          source = Path(sys.argv[2]).read_bytes().decode("utf-8", errors="strict")
          if not source.lstrip().lower().startswith("<!doctype html>"):
              raise SystemExit("Public callback body is not HTML")
          for marker in ("Google girişi tamamlanıyor", "Güvenli oturum oyuna aktarılıyor", "<script nonce="):
              if marker not in source:
                  raise SystemExit(f"Public callback marker missing: {marker}")
          for forbidden in ("SUPABASE_SERVICE_ROLE_KEY", "sb_secret_", "service_role", "Authorization: Bearer"):
              if forbidden in source:
                  raise SystemExit(f"Public callback leaks forbidden material: {forbidden}")
          Path("deployment/status/public-oauth-callback-verification.json").write_text(
              json.dumps({
                  "status": "verified",
                  "content_type": headers.get("content-type", ""),
                  "utf8": True,
                  "inline": True,
                  "secret_markers_absent": True,
              }, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          rm -f "$HEADER_FILE" "$BODY_FILE"

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: colony-oauth-callback-live-verification
          retention-days: 2
          if-no-files-found: warn
          path: deployment/status/
