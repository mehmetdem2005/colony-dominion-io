name: Final Rivet Release Observer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: read

jobs:
  observe:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'rivet-final-release-observer-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    env:
      GH_TOKEN: ${{ github.token }}
      OBSERVER_BRANCH: rivet-final-release-observer-v2
      TARGET_WORKFLOW: deploy-rivet-full-online-direct.yml
      TARGET_ARTIFACT: colony-dominion-rivet-direct-staging
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.OBSERVER_BRANCH }}
          fetch-depth: 0

      - name: Dispatch, locate, and wait for final deployment
        shell: bash
        run: |
          set -euo pipefail
          REPO="$GITHUB_REPOSITORY"
          mkdir -p deployment/status
          TARGET_SHA="$(gh api "repos/$REPO/commits/main" --jq .sha)"
          echo "TARGET_SHA=$TARGET_SHA"

          find_run() {
            gh run list \
              --repo "$REPO" \
              --workflow "$TARGET_WORKFLOW" \
              --branch main \
              --limit 30 \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"$TARGET_SHA\") | .databaseId" \
              | head -n 1
          }

          RUN_ID=""
          for _ in $(seq 1 12); do
            RUN_ID="$(find_run)"
            [ -n "$RUN_ID" ] && break
            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            gh workflow run "$TARGET_WORKFLOW" \
              --repo "$REPO" \
              --ref main \
              -f confirmation=DEPLOY-RIVET-FULL-ONLINE-DIRECT
          fi

          for _ in $(seq 1 180); do
            RUN_ID="$(find_run)"
            [ -n "$RUN_ID" ] && break
            sleep 5
          done
          test -n "$RUN_ID"
          echo "RIVET_LIVE_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"

          set +e
          gh run watch "$RUN_ID" --repo "$REPO" --exit-status
          WATCH_STATUS=$?
          set -e

          gh run view "$RUN_ID" \
            --repo "$REPO" \
            --json databaseId,status,conclusion,event,headSha,url,attempt,workflowName,createdAt,updatedAt \
            > deployment/status/rivet-final-live-run.json
          gh run view "$RUN_ID" --repo "$REPO" --log-failed \
            > deployment/status/rivet-final-live-failure.log 2>&1 || true
          if [ "$WATCH_STATUS" -eq 0 ]; then
            rm -f deployment/status/rivet-final-live-failure.log
          fi

      - name: Download final artifact
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf deployment/status/rivet-final-evidence
          mkdir -p deployment/status/rivet-final-evidence
          if [ -n "${RIVET_LIVE_RUN_ID:-}" ]; then
            gh run download "$RIVET_LIVE_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$TARGET_ARTIFACT" \
              --dir deployment/status/rivet-final-evidence
          fi
          true

      - name: Commit observation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A deployment/status/rivet-final-live-run.json
          git add -A deployment/status/rivet-final-live-failure.log
          git add -A deployment/status/rivet-final-evidence
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Snapshot final Rivet release"
          git push origin "HEAD:$OBSERVER_BRANCH"
