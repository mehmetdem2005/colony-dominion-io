name: Full Online Scoped Patch Bot

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'full-online-completion'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: full-online-completion
          fetch-depth: 0

      - name: Expand authoritative colony slots to ten
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("gameplay/match/match_controller.gd")
          text = path.read_text(encoding="utf-8")
          pattern = re.compile(
              r'const SPAWN_POSITIONS: Array\[Vector2\] = \[.*?\n\]\n'
              r'const COLONY_NAMES: Array\[String\] = \[.*?\n\]\n'
              r'const TEAM_COLORS: Array\[Color\] = \[.*?\n\]',
              re.S,
          )
          replacement = '''const SPAWN_POSITIONS: Array[Vector2] = [
          \tVector2(-7200.0, 0.0),
          \tVector2(7200.0, 0.0),
          \tVector2(0.0, -7600.0),
          \tVector2(0.0, 7600.0),
          \tVector2(-5200.0, -5200.0),
          \tVector2(5200.0, -5200.0),
          \tVector2(-5200.0, 5200.0),
          \tVector2(5200.0, 5200.0),
          \tVector2(-8800.0, -3000.0),
          \tVector2(8800.0, 3000.0),
          ]
          const COLONY_NAMES: Array[String] = [
          \t"QueenAnt",
          \t"Red Swarm",
          \t"Bug Dominion",
          \t"Forest Legion",
          \t"Tiny Stompers",
          \t"Leaf Lickers",
          \t"Amber Mandibles",
          \t"Night Foragers",
          \t"Stone Colony",
          \t"River Brood",
          ]
          const TEAM_COLORS: Array[Color] = [
          \tColor("2a9cff"),
          \tColor("ff3d49"),
          \tColor("35e06f"),
          \tColor("c252ff"),
          \tColor("ff9f1a"),
          \tColor("18d9e8"),
          \tColor("ffd23f"),
          \tColor("f15bb5"),
          \tColor("8ac926"),
          \tColor("b08968"),
          ]'''
          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"Expected one colony constants block, replaced {count}")
          path.write_text(updated, encoding="utf-8")
          PY

          grep -q 'Vector2(8800.0, 3000.0)' gameplay/match/match_controller.gd
          grep -q '"River Brood"' gameplay/match/match_controller.gd
          test "$(grep -c '^[[:space:]]*Color("' gameplay/match/match_controller.gd | head -n 1)" -ge 10

      - name: Commit scoped patch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gameplay/match/match_controller.gd
          git commit -m "Expand authoritative match to ten colony slots"
          git push origin HEAD:full-online-completion
