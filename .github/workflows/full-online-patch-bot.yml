name: Full Online Scoped Validation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'full-online-completion'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GODOT_VERSION: "4.6.3"
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/godot
    steps:
      - uses: actions/checkout@v6
        with:
          ref: full-online-completion
          fetch-depth: 0

      - name: Detect status-only commit
        shell: bash
        run: |
          set -euo pipefail
          MESSAGE="$(git log -1 --pretty=%s)"
          if [ "$MESSAGE" = "Record full-online scoped validation status" ]; then
            echo "SKIP_VALIDATION=true" >> "$GITHUB_ENV"
          else
            echo "SKIP_VALIDATION=false" >> "$GITHUB_ENV"
          fi

      - name: Apply deterministic source patches
        if: env.SKIP_VALIDATION != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          match_path = Path("gameplay/match/match_controller.gd")
          match_text = match_path.read_text(encoding="utf-8")
          pattern = re.compile(
              r'const SPAWN_POSITIONS: Array\[Vector2\] = \[.*?\n\]\n'
              r'const COLONY_NAMES: Array\[String\] = \[.*?\n\]\n'
              r'const TEAM_COLORS: Array\[Color\] = \[.*?\n\]',
              re.S,
          )
          replacement = '''const SPAWN_POSITIONS: Array[Vector2] = [
          \tVector2(-7200.0, 0.0),
          \tVector2(7200.0, 0.0),
          \tVector2(0.0, -7600.0),
          \tVector2(0.0, 7600.0),
          \tVector2(-5200.0, -5200.0),
          \tVector2(5200.0, -5200.0),
          \tVector2(-5200.0, 5200.0),
          \tVector2(5200.0, 5200.0),
          \tVector2(-8800.0, -3000.0),
          \tVector2(8800.0, 3000.0),
          ]
          const COLONY_NAMES: Array[String] = [
          \t"QueenAnt",
          \t"Red Swarm",
          \t"Bug Dominion",
          \t"Forest Legion",
          \t"Tiny Stompers",
          \t"Leaf Lickers",
          \t"Amber Mandibles",
          \t"Night Foragers",
          \t"Stone Colony",
          \t"River Brood",
          ]
          const TEAM_COLORS: Array[Color] = [
          \tColor("2a9cff"),
          \tColor("ff3d49"),
          \tColor("35e06f"),
          \tColor("c252ff"),
          \tColor("ff9f1a"),
          \tColor("18d9e8"),
          \tColor("ffd23f"),
          \tColor("f15bb5"),
          \tColor("8ac926"),
          \tColor("b08968"),
          ]'''
          updated, count = pattern.subn(replacement, match_text, count=1)
          if count != 1:
              raise SystemExit(f"Expected one colony constants block, replaced {count}")
          match_path.write_text(updated, encoding="utf-8")

          actor_path = Path("backend/rivet-control/src/game-server-actor.ts")
          actor_text = actor_path.read_text(encoding="utf-8")
          actor_text = actor_text.replace(
              'import { spawn, type ChildProcessWithoutNullStreams } from "node:child_process";',
              'import { spawn, type ChildProcess } from "node:child_process";',
          )
          actor_text = actor_text.replace(
              "child: ChildProcessWithoutNullStreams;",
              "child: ChildProcess;",
          )
          actor_text = actor_text.replace(
              'child.stdout.on("data", (chunk: Buffer) => appendLogs(runtime, "stdout", chunk));',
              'child.stdout?.on("data", (chunk: Buffer) => appendLogs(runtime, "stdout", chunk));',
          )
          actor_text = actor_text.replace(
              'child.stderr.on("data", (chunk: Buffer) => appendLogs(runtime, "stderr", chunk));',
              'child.stderr?.on("data", (chunk: Buffer) => appendLogs(runtime, "stderr", chunk));',
          )
          if "ChildProcessWithoutNullStreams" in actor_text:
              raise SystemExit("Legacy child process type remains")
          actor_path.write_text(actor_text, encoding="utf-8")
          PY

          grep -q 'Vector2(8800.0, 3000.0)' gameplay/match/match_controller.gd
          grep -q 'child: ChildProcess;' backend/rivet-control/src/game-server-actor.ts
          grep -q 'child.stdout?.on' backend/rivet-control/src/game-server-actor.ts

      - uses: actions/setup-node@v6
        if: env.SKIP_VALIDATION != 'true'
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: actions/setup-python@v6
        if: env.SKIP_VALIDATION != 'true'
        with:
          python-version: "3.12"

      - name: Install validation tools
        id: tools
        if: env.SKIP_VALIDATION != 'true'
        continue-on-error: true
        run: python -m pip install --disable-pip-version-check gdtoolkit pglast pyyaml pillow

      - name: Install Godot and templates
        id: godot_install
        if: env.SKIP_VALIDATION != 'true'
        continue-on-error: true
        run: tools/install_godot_ci.sh

      - name: Validate architecture
        id: architecture
        if: env.SKIP_VALIDATION != 'true'
        continue-on-error: true
        run: python tools/validate_online_release.py

      - name: Typecheck and build Rivet runtime
        id: typescript
        if: env.SKIP_VALIDATION != 'true'
        continue-on-error: true
        working-directory: backend/rivet-control
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run typecheck
          npm run build

      - name: Lint and format GDScript
        id: gdscript
        if: env.SKIP_VALIDATION != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find . -type f -name '*.gd' \
              -not -path './.godot/*' \
              -not -path './.godot-bin/*' \
              -not -path './build/*' \
              | sort
          )
          test "${#files[@]}" -gt 0
          gdlint "${files[@]}"
          gdformat --check "${files[@]}"

      - name: Parse, test and export dedicated server
        id: godot
        if: env.SKIP_VALIDATION != 'true'
        continue-on-error: true
        run: tools/build_dedicated_server.sh

      - name: Build embedded Godot Rivet image
        id: docker
        if: env.SKIP_VALIDATION != 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          docker build \
            -f backend/rivet-control/Dockerfile \
            -t colony-rivet-full-online:${GITHUB_SHA:0:12} \
            .
          mkdir -p build
          docker image inspect colony-rivet-full-online:${GITHUB_SHA:0:12} \
            --format '{{.Id}} {{.Architecture}}' \
            | tee build/full-online-container.txt
          docker run --rm \
            --entrypoint /usr/local/bin/godot \
            colony-rivet-full-online:${GITHUB_SHA:0:12} \
            --headless --version \
            | tee build/full-online-godot-version.txt
          grep -q '4.6.3' build/full-online-godot-version.txt

      - name: Upload scoped validation evidence
        if: always() && env.SKIP_VALIDATION != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: full-online-scoped-validation
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/ci-logs/
            build/full-online-container.txt
            build/full-online-godot-version.txt
            build/server/

      - name: Persist scoped validation result
        if: always() && env.SKIP_VALIDATION != 'true'
        env:
          TOOLS_OUTCOME: ${{ steps.tools.outcome }}
          GODOT_INSTALL_OUTCOME: ${{ steps.godot_install.outcome }}
          ARCHITECTURE_OUTCOME: ${{ steps.architecture.outcome }}
          TYPESCRIPT_OUTCOME: ${{ steps.typescript.outcome }}
          GDSCRIPT_OUTCOME: ${{ steps.gdscript.outcome }}
          GODOT_OUTCOME: ${{ steps.godot.outcome }}
          DOCKER_OUTCOME: ${{ steps.docker.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          VALIDATED_SHA="$(git rev-parse HEAD)"
          mkdir -p deployment/status
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          steps = {
              "tools": os.environ.get("TOOLS_OUTCOME", "unknown"),
              "godot_install": os.environ.get("GODOT_INSTALL_OUTCOME", "unknown"),
              "architecture": os.environ.get("ARCHITECTURE_OUTCOME", "unknown"),
              "typescript": os.environ.get("TYPESCRIPT_OUTCOME", "unknown"),
              "gdscript": os.environ.get("GDSCRIPT_OUTCOME", "unknown"),
              "godot": os.environ.get("GODOT_OUTCOME", "unknown"),
              "docker": os.environ.get("DOCKER_OUTCOME", "unknown"),
          }
          success = all(value == "success" for value in steps.values())
          payload = {
              "success": success,
              "validated_sha": os.environ["VALIDATED_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "recorded_at": datetime.now(timezone.utc).isoformat(),
              "steps": steps,
              "provider": "rivet_only",
              "protocol_version": 4,
              "max_players": 10,
              "external_hosting": False,
          }
          Path("deployment/status/full-online-branch-validation.json").write_text(
              json.dumps(payload, indent=2) + "\n", encoding="utf-8"
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            gameplay/match/match_controller.gd \
            backend/rivet-control/src/game-server-actor.ts \
            deployment/status/full-online-branch-validation.json
          git commit -m "Record full-online scoped validation status"
          git push origin HEAD:full-online-completion

          if [ "${{ steps.tools.outcome }}" != "success" ] \
            || [ "${{ steps.godot_install.outcome }}" != "success" ] \
            || [ "${{ steps.architecture.outcome }}" != "success" ] \
            || [ "${{ steps.typescript.outcome }}" != "success" ] \
            || [ "${{ steps.gdscript.outcome }}" != "success" ] \
            || [ "${{ steps.godot.outcome }}" != "success" ] \
            || [ "${{ steps.docker.outcome }}" != "success" ]; then
            exit 1
          fi
